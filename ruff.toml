target-version = "py311"
line-length = 120

[lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "S"]

[lint.isort]
known-first-party = [
    "admin_auth",
    "auth",
    "auth_helpers",
    "backup_service",
    "chunker",
    "circuit_breaker",
    "collections_models",
    "collections_service",
    "config",
    "correlation",
    "document_indexer",
    "document_lister",
    "embeddings",
    "logging_config",
    "login_page",
    "main",
    "metadata",
    "metrics",
    "model_utils",
    "pages",
    "password_policy",
    "perf_metrics",
    "reset_password",
    "search_service",
    "template",
    "thumbnail",
    "utils",
]

[lint.per-file-ignores]
"**/tests/*.py" = ["S101", "S105", "S106", "S107", "S314"]
"tests/stress/*.py" = ["S101", "S105", "S106", "S107"]
"e2e/*.py" = ["S101"]
"e2e/conftest.py" = ["S108"]
"e2e/test_upload_index_search.py" = ["S603"]
"src/embeddings-server/main.py" = ["S104"]
"src/solr-search/main.py" = ["S104"]
"src/solr-search/tests/test_upload.py" = ["S108"]
