services:
  redis:
    image: redis:7.4-alpine
    command: >-
      sh -c 'exec redis-server /usr/local/etc/redis/redis.conf
      --requirepass "$$REDIS_PASSWORD"'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - REDISCLI_AUTH=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 15s
      retries: 1
    restart: unless-stopped
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
        aliases:
          - redis
    volumes:
      - redis-data:/data
      - ./src/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
  rabbitmq:
    image: rabbitmq:4.0-management
    entrypoint: /etc/rabbitmq/init-definitions.sh
    command: rabbitmq-server
    hostname: rabbitmq
    environment:
      # Admin user created on first Mnesia init (replaces default guest user)
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_ADMIN_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_ADMIN_PASS:-admin_dev_pass}
      # Per-service passwords --- init-definitions.sh reads these to generate
      # /etc/rabbitmq/definitions.json at startup (see load_definitions in rabbitmq.conf)
      - RABBITMQ_LISTER_PASS=${RABBITMQ_LISTER_PASS:-lister_dev_pass}
      - RABBITMQ_INDEXER_PASS=${RABBITMQ_INDEXER_PASS:-indexer_dev_pass}
      - RABBITMQ_SEARCH_PASS=${RABBITMQ_SEARCH_PASS:-search_dev_pass}
      - RABBITMQ_ADMIN_PASS=${RABBITMQ_ADMIN_PASS:-admin_dev_pass}
    expose:
      - 5672
      - 15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./src/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./src/rabbitmq/init-definitions.sh:/etc/rabbitmq/init-definitions.sh:ro

    healthcheck:
      test: ["CMD", "rabbitmqctl", "ping"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
        aliases:
          - rabbitmq
  embeddings-server:
    image: ghcr.io/jmservera/aithena-embeddings-server:${VERSION:-latest}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 2g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
        aliases:
          - embeddings-server
  document-lister:
    image: ghcr.io/jmservera/aithena-document-lister:${VERSION:-latest}
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_LISTER_USER:-lister}
      - RABBITMQ_PASS=${RABBITMQ_LISTER_PASS:-lister_dev_pass}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - QUEUE_NAME=shortembeddings
      - EXCHANGE_NAME=documents
      - BASE_PATH=/data/documents/
      - DOCUMENT_WILDCARD=*.pdf
      - POLL_INTERVAL=60
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: on-failure
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - document-data:/data/documents
    networks:
      - default
  document-indexer:
    image: ghcr.io/jmservera/aithena-document-indexer:${VERSION:-latest}
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_INDEXER_USER:-indexer}
      - RABBITMQ_PASS=${RABBITMQ_INDEXER_PASS:-indexer_dev_pass}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - QUEUE_NAME=shortembeddings
      - EXCHANGE_NAME=documents
      - BASE_PATH=/data/documents/
      - SOLR_HOST=solr
      - SOLR_PORT=8983
      - SOLR_COLLECTION=books
      - EMBEDDINGS_HOST=embeddings-server
      - EMBEDDINGS_PORT=8080
      - CHUNK_SIZE=300
      - CHUNK_OVERLAP=50
      - SOLR_AUTH_USER=${SOLR_ADMIN_USER:?Set SOLR_ADMIN_USER}
      - SOLR_AUTH_PASS=${SOLR_ADMIN_PASS:?Set SOLR_ADMIN_PASS}
    restart: on-failure
    stop_grace_period: 10s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      embeddings-server:
        condition: service_healthy
      solr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - document-data:/data/documents:ro
    networks:
      - default
  solr-search:
    image: ghcr.io/jmservera/aithena-solr-search:${VERSION:-latest}
    expose:
      - "8080"
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      solr:
        condition: service_healthy
      embeddings-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PORT=8080
      - SOLR_URL=http://solr:8983/solr
      - SOLR_COLLECTION=books
      - BASE_PATH=/data/documents
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - EMBEDDINGS_URL=http://embeddings-server:8080/v1/embeddings/
      - DEFAULT_SEARCH_MODE=keyword
      - UPLOAD_DIR=/data/documents/uploads
      - MAX_UPLOAD_SIZE_MB=50
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_SEARCH_USER:-search}
      - RABBITMQ_PASS=${RABBITMQ_SEARCH_PASS:-search_dev_pass}
      - RABBITMQ_QUEUE_NAME=shortembeddings
      - E5_COLLECTIONS=books
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - AUTH_DB_PATH=${AUTH_DB_PATH:-/data/auth/users.db}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:?error Run python -m installer to generate secrets}
      - AUTH_JWT_TTL=${AUTH_JWT_TTL:-24h}
      - AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME:-aithena_auth}
      - COLLECTIONS_DB_PATH=${COLLECTIONS_DB_PATH:-/data/collections/collections.db}
      - SOLR_AUTH_USER=${SOLR_READONLY_USER:?Set SOLR_READONLY_USER}
      - SOLR_AUTH_PASS=${SOLR_READONLY_PASS:?Set SOLR_READONLY_PASS}
    volumes:
      - document-data:/data/documents
      - collections-db:/data/collections
      - type: bind
        source: ${AUTH_DB_DIR:?AUTH_DB_DIR is not set. Run 'python3 -m installer' to generate auth configuration}
        target: /data/auth
    networks:
      - default
  redis-commander:
    image: rediscommander/redis-commander:latest
    expose:
      - "8081"
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8081/admin/redis', (res) => process.exit(res.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - URL_PREFIX=/admin/redis
    networks:
      - default
  aithena-ui:
    image: ghcr.io/jmservera/aithena-aithena-ui:${VERSION:-latest}
    expose:
      - "8080"
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      solr-search:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      aithena-ui:
        condition: service_healthy
      solr-search:
        condition: service_healthy
      redis-commander:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      solr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
    volumes:
      - ./src/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/nginx/html:/usr/share/nginx/html:ro
      - document-data:/data/documents:ro
  zoo1:
    image: zookeeper:3.9
    entrypoint: /entrypoint-sasl.sh
    command: ["zkServer.sh", "start-foreground"]
    expose:
      - "2181"
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_CFG_EXTRA: "admin.enableServer=false quorum.auth.enableSasl=true quorum.auth.learnerRequireSasl=true quorum.auth.serverRequireSasl=true authProvider.1=org.apache.zookeeper.server.auth.SASLAuthenticationProvider"
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
      ZK_SASL_USER: ${ZK_SASL_USER:-solr}
      ZK_SASL_PASS: ${ZK_SASL_PASS:?ZK_SASL_PASS must be set in .env for production}
      SERVER_JVMFLAGS: "-Djava.security.auth.login.config=/conf/jaas.conf"
    volumes:
      - zoo-data1_logs:/logs
      - zoo-data1_data:/data
      - zoo-data1_datalog:/datalog
      - zoo-backup:/backup
      - ./src/zookeeper/entrypoint-sasl.sh:/entrypoint-sasl.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "printf ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  zoo2:
    image: zookeeper:3.9
    entrypoint: /entrypoint-sasl.sh
    command: ["zkServer.sh", "start-foreground"]
    expose:
      - "2181"
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_CFG_EXTRA: "admin.enableServer=false quorum.auth.enableSasl=true quorum.auth.learnerRequireSasl=true quorum.auth.serverRequireSasl=true authProvider.1=org.apache.zookeeper.server.auth.SASLAuthenticationProvider"
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
      ZK_SASL_USER: ${ZK_SASL_USER:-solr}
      ZK_SASL_PASS: ${ZK_SASL_PASS:?ZK_SASL_PASS must be set in .env for production}
      SERVER_JVMFLAGS: "-Djava.security.auth.login.config=/conf/jaas.conf"
    volumes:
      - zoo-data2_logs:/logs
      - zoo-data2_data:/data
      - zoo-data2_datalog:/datalog
      - zoo-backup:/backup
      - ./src/zookeeper/entrypoint-sasl.sh:/entrypoint-sasl.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "printf ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  zoo3:
    image: zookeeper:3.9
    entrypoint: /entrypoint-sasl.sh
    command: ["zkServer.sh", "start-foreground"]
    expose:
      - "2181"
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_CFG_EXTRA: "admin.enableServer=false quorum.auth.enableSasl=true quorum.auth.learnerRequireSasl=true quorum.auth.serverRequireSasl=true authProvider.1=org.apache.zookeeper.server.auth.SASLAuthenticationProvider"
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
      ZK_SASL_USER: ${ZK_SASL_USER:-solr}
      ZK_SASL_PASS: ${ZK_SASL_PASS:?ZK_SASL_PASS must be set in .env for production}
      SERVER_JVMFLAGS: "-Djava.security.auth.login.config=/conf/jaas.conf"
    volumes:
      - zoo-data3_logs:/logs
      - zoo-data3_data:/data
      - zoo-data3_datalog:/datalog
      - zoo-backup:/backup
      - ./src/zookeeper/entrypoint-sasl.sh:/entrypoint-sasl.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "printf ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  solr:
    image: solr:9.7
    entrypoint: /entrypoint-sasl.sh
    command: ["solr-foreground"]
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - solr-data:/var/solr/data
      - document-data:/data/documents:ro
      - ./src/solr/entrypoint-sasl.sh:/entrypoint-sasl.sh:ro
    environment:
      SOLR_MODULES: extraction,langid
      SOLR_SECURITY_MANAGER_ENABLED: "false"
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
      SOLR_AUTH_USER: ${SOLR_ADMIN_USER:?Set SOLR_ADMIN_USER}
      SOLR_AUTH_PASS: ${SOLR_ADMIN_PASS:?Set SOLR_ADMIN_PASS}
      ZK_SASL_USER: ${ZK_SASL_USER:-solr}
      ZK_SASL_PASS: ${ZK_SASL_PASS:?ZK_SASL_PASS must be set in .env for production}
      SOLR_ZK_CREDS_AND_ACLS: "-DzkCredentialsProvider=org.apache.solr.common.cloud.DigestZkCredentialsProvider -DzkACLProvider=org.apache.solr.common.cloud.DigestZkACLProvider -DzkDigestUsername=${ZK_SASL_USER:-solr} -DzkDigestPassword=${ZK_SASL_PASS:?ZK_SASL_PASS must be set}"
      SOLR_OPTS: "-DzkCredentialsProvider=org.apache.solr.common.cloud.DigestZkCredentialsProvider -DzkACLProvider=org.apache.solr.common.cloud.DigestZkACLProvider -DzkDigestUsername=${ZK_SASL_USER:-solr} -DzkDigestPassword=${ZK_SASL_PASS:?ZK_SASL_PASS}"
    expose:
      - "8983"
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u $${SOLR_AUTH_USER}:$${SOLR_AUTH_PASS} http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
  solr2:
    image: solr:9.7
    entrypoint: /entrypoint-sasl.sh
    command: ["solr-foreground"]
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - solr-data2:/var/solr/data
      - document-data:/data/documents:ro
      - ./src/solr/entrypoint-sasl.sh:/entrypoint-sasl.sh:ro
    environment:
      SOLR_MODULES: extraction,langid
      SOLR_SECURITY_MANAGER_ENABLED: "false"
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
      SOLR_AUTH_USER: ${SOLR_ADMIN_USER:?Set SOLR_ADMIN_USER}
      SOLR_AUTH_PASS: ${SOLR_ADMIN_PASS:?Set SOLR_ADMIN_PASS}
      ZK_SASL_USER: ${ZK_SASL_USER:-solr}
      ZK_SASL_PASS: ${ZK_SASL_PASS:?ZK_SASL_PASS must be set in .env for production}
      SOLR_ZK_CREDS_AND_ACLS: "-DzkCredentialsProvider=org.apache.solr.common.cloud.DigestZkCredentialsProvider -DzkACLProvider=org.apache.solr.common.cloud.DigestZkACLProvider -DzkDigestUsername=${ZK_SASL_USER:-solr} -DzkDigestPassword=${ZK_SASL_PASS:?ZK_SASL_PASS must be set}"
      SOLR_OPTS: "-DzkCredentialsProvider=org.apache.solr.common.cloud.DigestZkCredentialsProvider -DzkACLProvider=org.apache.solr.common.cloud.DigestZkACLProvider -DzkDigestUsername=${ZK_SASL_USER:-solr} -DzkDigestPassword=${ZK_SASL_PASS:?ZK_SASL_PASS}"
    expose:
      - "8983"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u $${SOLR_AUTH_USER}:$${SOLR_AUTH_PASS} http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
      solr:
        condition: service_healthy
  solr3:
    image: solr:9.7
    entrypoint: /entrypoint-sasl.sh
    command: ["solr-foreground"]
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - solr-data3:/var/solr/data
      - document-data:/data/documents:ro
      - ./src/solr/entrypoint-sasl.sh:/entrypoint-sasl.sh:ro
    environment:
      SOLR_MODULES: extraction,langid
      SOLR_SECURITY_MANAGER_ENABLED: "false"
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
      SOLR_AUTH_USER: ${SOLR_ADMIN_USER:?Set SOLR_ADMIN_USER}
      SOLR_AUTH_PASS: ${SOLR_ADMIN_PASS:?Set SOLR_ADMIN_PASS}
      ZK_SASL_USER: ${ZK_SASL_USER:-solr}
      ZK_SASL_PASS: ${ZK_SASL_PASS:?ZK_SASL_PASS must be set in .env for production}
      SOLR_ZK_CREDS_AND_ACLS: "-DzkCredentialsProvider=org.apache.solr.common.cloud.DigestZkCredentialsProvider -DzkACLProvider=org.apache.solr.common.cloud.DigestZkACLProvider -DzkDigestUsername=${ZK_SASL_USER:-solr} -DzkDigestPassword=${ZK_SASL_PASS:?ZK_SASL_PASS must be set}"
      SOLR_OPTS: "-DzkCredentialsProvider=org.apache.solr.common.cloud.DigestZkCredentialsProvider -DzkACLProvider=org.apache.solr.common.cloud.DigestZkACLProvider -DzkDigestUsername=${ZK_SASL_USER:-solr} -DzkDigestPassword=${ZK_SASL_PASS:?ZK_SASL_PASS}"
    expose:
      - "8983"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u $${SOLR_AUTH_USER}:$${SOLR_AUTH_PASS} http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
      solr2:
        condition: service_healthy
  solr-init:
    image: solr:9.7
    depends_on:
      solr:
        condition: service_healthy
      solr2:
        condition: service_healthy
      solr3:
        condition: service_healthy
    volumes:
      - ./src/solr/books:/configsets/books:ro
      - ./src/solr/add-conf-overlay.sh:/scripts/add-conf-overlay.sh:ro
      - ./src/solr/security.json:/scripts/security.json:ro
    environment:
      SOLR_SECURITY_MANAGER_ENABLED: "false"
      SOLR_ADMIN_USER: ${SOLR_ADMIN_USER:?Set SOLR_ADMIN_USER}
      SOLR_ADMIN_PASS: ${SOLR_ADMIN_PASS:?Set SOLR_ADMIN_PASS}
      SOLR_READONLY_USER: ${SOLR_READONLY_USER:?Set SOLR_READONLY_USER}
      SOLR_READONLY_PASS: ${SOLR_READONLY_PASS:?Set SOLR_READONLY_PASS}
      SOLR_AUTH_USER: ${SOLR_ADMIN_USER:?Set SOLR_ADMIN_USER}
      SOLR_AUTH_PASS: ${SOLR_ADMIN_PASS:?Set SOLR_ADMIN_PASS}
      ZK_SASL_USER: ${ZK_SASL_USER:-solr}
      ZK_SASL_PASS: ${ZK_SASL_PASS:?ZK_SASL_PASS must be set in .env for production}
      SOLR_ZK_CREDS_AND_ACLS: "-DzkCredentialsProvider=org.apache.solr.common.cloud.DigestZkCredentialsProvider -DzkACLProvider=org.apache.solr.common.cloud.DigestZkACLProvider -DzkDigestUsername=${ZK_SASL_USER:-solr} -DzkDigestPassword=${ZK_SASL_PASS:?ZK_SASL_PASS must be set}"
      SOLR_OPTS: "-DzkCredentialsProvider=org.apache.solr.common.cloud.DigestZkCredentialsProvider -DzkACLProvider=org.apache.solr.common.cloud.DigestZkACLProvider -DzkDigestUsername=${ZK_SASL_USER:-solr} -DzkDigestPassword=${ZK_SASL_PASS:?ZK_SASL_PASS}"
    entrypoint:
      - /bin/bash
      - -ceu
      - |
          set -o pipefail

          ZK_HOST="zoo1:2181,zoo2:2181,zoo3:2181"
          SOLR_URL="http://solr:8983"

          until curl -fsS -u "$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASS" "$$SOLR_URL/solr/admin/info/system" >/dev/null 2>&1 || curl -fsS "$$SOLR_URL/solr/admin/info/system" >/dev/null 2>&1; do
            sleep 2
          done

          until [ "$$(curl -fsS "$$SOLR_URL/solr/admin/collections?action=CLUSTERSTATUS&wt=json" | grep -o '"[^"]*:8983_solr"' | sort -u | wc -l | tr -d '[:space:]')" -ge 3 ]; do
            sleep 2
          done

          # --- Security: Bootstrap BasicAuth + RBAC ---
          echo "Uploading security.json to ZooKeeper..."
          solr zk cp file:/scripts/security.json zk:/security.json -z "$$ZK_HOST"

          echo "Creating Solr users via Authentication API..."
          curl -fsS -u "$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASS" "$$SOLR_URL/solr/admin/authentication" \
            -H 'Content-Type: application/json' \
            -d '{"set-user": {"'"$$SOLR_ADMIN_USER"'": "'"$$SOLR_ADMIN_PASS"'", "'"$$SOLR_READONLY_USER"'": "'"$$SOLR_READONLY_PASS"'"}}' || \
          curl -fsS "$$SOLR_URL/solr/admin/authentication" \
            -H 'Content-Type: application/json' \
            -d '{"set-user": {"'"$$SOLR_ADMIN_USER"'": "'"$$SOLR_ADMIN_PASS"'", "'"$$SOLR_READONLY_USER"'": "'"$$SOLR_READONLY_PASS"'"}}'

          echo "Assigning roles via Authorization API..."
          curl -fsS -u "$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASS" "$$SOLR_URL/solr/admin/authorization" \
            -H 'Content-Type: application/json' \
            -d '{"set-user-role": {"'"$$SOLR_ADMIN_USER"'": "admin", "'"$$SOLR_READONLY_USER"'": "readonly"}}' || \
          curl -fsS "$$SOLR_URL/solr/admin/authorization" \
            -H 'Content-Type: application/json' \
            -d '{"set-user-role": {"'"$$SOLR_ADMIN_USER"'": "admin", "'"$$SOLR_READONLY_USER"'": "readonly"}}'

          echo "Enabling blockUnknown..."
          curl -fsS -u "$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASS" "$$SOLR_URL/solr/admin/authentication" \
            -H 'Content-Type: application/json' \
            -d '{"set-property": {"blockUnknown": true}}'

          echo "Security bootstrap complete."

          if ! solr zk ls /configs -z "$$ZK_HOST" | grep -q 'books'; then
            solr zk upconfig -z "$$ZK_HOST" -n books -d /configsets/books
          fi

          if ! curl -fsS -u "$$SOLR_AUTH_USER:$$SOLR_AUTH_PASS" "$$SOLR_URL/solr/admin/collections?action=LIST&wt=json" | grep -q '"books"'; then
            curl -fsS -u "$$SOLR_AUTH_USER:$$SOLR_AUTH_PASS" "$$SOLR_URL/solr/admin/collections?action=CREATE&name=books&collection.configName=books&numShards=1&replicationFactor=3&waitForFinalState=true&wt=json"
          fi

          SOLR_BASE_URL="$$SOLR_URL" SOLR_COLLECTION="books" SOLR_AUTH_USER="$$SOLR_AUTH_USER" SOLR_AUTH_PASS="$$SOLR_AUTH_PASS" sh /scripts/add-conf-overlay.sh

          echo "Solr init complete"
    networks:
      - default
    restart: "no"
volumes:
  rabbitmq-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/rabbitmq-data"

  redis-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
