  redis-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/redis"
  # Book library mount — update device path to point at your local PDF collection.
  # All services that need to read PDFs mount this volume read-only.
  document-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/home/jmservera/booklibrary"
