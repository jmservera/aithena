  nginx:
    image: nginx:1.15-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-data:/etc/nginx/conf.d
      - certbot-data-conf:/etc/letsencrypt
      - certbot-data-www:/var/www/certbot
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-data-conf:/etc/letsencrypt
      - certbot-data-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  zoo1:
    image: zookeeper:3.9
    ports:
      - 18080:8080
      - 2181:2181
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    volumes:
      - zoo-data1_logs:/logs
      - zoo-data1_data:/data
      - zoo-data1_datalog:/datalog
      - zoo-backup:/backup
  zoo2:
    image: zookeeper:3.9
    ports:
      - 2182:2181
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    volumes:
      - zoo-data2_logs:/logs
      - zoo-data2_data:/data
      - zoo-data2_datalog:/datalog
      - zoo-backup:/backup
    depends_on:
      - zoo1
  zoo3:
    image: zookeeper:3.9
    ports:
      - 2183:2181
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    volumes:
      - zoo-data3_logs:/logs
      - zoo-data3_data:/data
      - zoo-data3_datalog:/datalog
      - zoo-backup:/backup
    depends_on:
      - zoo2
  solr:
    image: solr:9.7
    # build:
    #   context: .
    #   dockerfile: ./solr/Dockerfile
    restart: unless-stopped
    volumes:
      - solr-data:/var/solr/data
      - document-data:/data/documents:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
    ports:
      - "8983:8983"
    networks:
      - default
    # command: solr-precreate -c books
    depends_on:
      - zoo1
      - zoo2
      - zoo3
  # second solr node
  solr2:
    image: solr:9.7
    # build:
    #   context: .
    #   dockerfile: ./solr/Dockerfile
    restart: unless-stopped
    volumes:
      - solr-data2:/var/solr/data
      - document-data:/data/documents:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
    ports:
      - "8984:8983"
    #command: solr-create -c books
    depends_on:
      - zoo1
      - zoo2
      - zoo3
      - solr
  solr3:
    image: solr:9.7
    # build:
    #   context: .
    #   dockerfile: ./solr/Dockerfile
    restart: unless-stopped
    volumes:
      - solr-data3:/var/solr/data
      - document-data:/data/documents:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
    ports:
      - "8985:8983"
    #command: solr-create -c books
    depends_on:
      - zoo1
      - zoo2
      - zoo3
      - solr2
