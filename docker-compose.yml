  embeddings-server:
    build: ./embeddings-server
    environment:
      - PORT=8085
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/.well-known/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      default:
        aliases:
          - embeddings-server
  document-lister:
    build: ./document-lister
    environment:
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - QUEUE_NAME=shortembeddings
      - POLL_INTERVAL=60  # seconds between library scans
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - document-data:/data/documents
    networks:
      - default
  document-indexer:
    build: ./document-indexer
    environment:
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - QUEUE_NAME=shortembeddings
      - BASE_PATH=/data/documents/
      - SOLR_HOST=solr
      - SOLR_PORT=8983
      - SOLR_COLLECTION=books
      - EMBEDDINGS_HOST=embeddings-server
      - EMBEDDINGS_PORT=8085
    restart: unless-stopped
    deploy:
      replicas: 1
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      solr:
        condition: service_healthy
      embeddings-server:
        condition: service_healthy
    volumes:
      - document-data:/data/documents:ro
    networks:
      - default
  solr-search:
    # FastAPI search API wrapping Solr /select and /kNN endpoints.
    # Accessible at http://localhost:8080 (development) or via nginx /api in production.
    build:
      context: .
      dockerfile: ./solr-search/Dockerfile
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      solr:
        condition: service_healthy
    environment:
      - PORT=8080
      - SOLR_URL=http://solr:8983/solr
      - SOLR_COLLECTION=books
      - BASE_PATH=/data/documents
      - CORS_ORIGINS=http://localhost:5173
    volumes:
      - document-data:/data/documents:ro
    networks:
      - default
  admin:
    # Streamlit admin dashboard for document management and indexing monitoring.
    # Accessible at http://localhost:8501 (development) or via nginx /admin in production.
    # Environment variables (QUEUE_NAME must match document-lister and document-indexer).
    build: ./admin
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_NAME=shortembeddings
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_MGMT_PORT=15672
    expose:
      - 8501
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
  # llama-playground:
  #   image: ghcr.io/mckaywrigley/chatbot-ui:main
  #   ports:
  #     - 3000:3000
  #   environment:
  #     - OPENAI_API_HOST=http://llama-server:8000
  #     - OPENAI_API_KEY=""
  nginx:
    image: nginx:1.15-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-data:/etc/nginx/conf.d
      - certbot-data-conf:/etc/letsencrypt
      - certbot-data-www:/var/www/certbot
    # nginx config in nginx-data volume should proxy:
    #   /          → aithena-ui (React frontend, served as static files)
    #   /api       → solr-search:8080 (FastAPI search service)
    #   /admin     → admin:8501 (Streamlit admin dashboard)
    #   /solr      → solr:8983 (Solr admin — restrict access in production)
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-data-conf:/etc/letsencrypt
      - certbot-data-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  zoo1:
    image: zookeeper:3.9
    ports:
      - 8080:8080
      - 2181:2181
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/commands/ruok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    volumes:
      - zoo-data1_logs:/logs
      - zoo-data1_data:/data
      - zoo-data1_datalog:/datalog
      - zoo-backup:/backup
  zoo2:
    image: zookeeper:3.9
    ports:
      - 2182:2181
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/commands/ruok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    volumes:
      - zoo-data2_logs:/logs
      - zoo-data2_data:/data
      - zoo-data2_datalog:/datalog
      - zoo-backup:/backup
    depends_on:
      zoo1:
        condition: service_healthy
  zoo3:
    image: zookeeper:3.9
    ports:
      - 2183:2181
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/commands/ruok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    volumes:
      - zoo-data3_logs:/logs
      - zoo-data3_data:/data
      - zoo-data3_datalog:/datalog
      - zoo-backup:/backup
    depends_on:
      zoo2:
        condition: service_healthy
  solr:
    image: solr
    # build:
    #   context: .
    #   dockerfile: ./solr/Dockerfile
    restart: unless-stopped
    volumes:
      - solr-data:/var/solr/data
      - document-data:/data/documents:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
    ports:
      - "8983:8983"
    networks:
      - default
    # command: solr-precreate -c books
    entrypoint: docker-entrypoint.sh solr start -c -f
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system?wt=json > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
  # second solr node
  solr2:
    image: solr
    # build:
    #   context: .
    #   dockerfile: ./solr/Dockerfile
    restart: unless-stopped
    volumes:
      - solr-data2:/var/solr/data
      - document-data:/data/documents:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
    ports:
      - "8984:8983"
    #command: solr-create -c books
    entrypoint: docker-entrypoint.sh solr start -c -f
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system?wt=json > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
      solr:
        condition: service_healthy
    networks:
      - default
  solr3:
    image: solr
    # build:
    #   context: .
    #   dockerfile: ./solr/Dockerfile
    restart: unless-stopped
    volumes:
      - solr-data3:/var/solr/data
      - document-data:/data/documents:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
    ports:
      - "8985:8983"
    #command: solr-create -c books
    entrypoint: docker-entrypoint.sh solr start -c -f
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system?wt=json > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
      solr2:
        condition: service_healthy
    networks:
      - default
volumes:
  rabbitmq-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/rabbitmq-data"
  # qdrant-data:
  #   driver: local
  #   driver_opts:
  #     type: "none"
  #     o: "bind"
  #     device: "/source/volumes/qdrant-data"
