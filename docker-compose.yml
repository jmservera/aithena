services:
  redis:
    # it is importnant to configure OS memory overcommit
    # https://github.com/nextcloud/all-in-one/discussions/1731
    # run this in your VM:
    # echo "vm.overcommit_memory = 1" | sudo tee /etc/sysctl.d/nextcloud-aio-memory-overcommit.conf
    image: redis
    command: redis-server --save 20 1 --loglevel warning
    expose:
      - 6379
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 15s
      retries: 1
    restart: on-failure
    networks:
      default:
        aliases:
          - redis
    volumes:
      - redis-data:/data
  rabbitmq:
    image: rabbitmq
    command: rabbitmq-server
    hostname: rabbitmq
    expose:
      - 5672
      - 15672
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbit consumer_timeout 3600000000
    healthcheck:
      test: ["CMD", "rabbitmqctl", "ping"]
      interval: 5s
      timeout: 15s
      retries: 1
    restart: on-failure
    networks:
      default:
        aliases:
          - rabbitmq
