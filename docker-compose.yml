services:
  redis:
    # it is importnant to configure OS memory overcommit
    # https://github.com/nextcloud/all-in-one/discussions/1731
    # run this in your VM:
    # echo "vm.overcommit_memory = 1" | sudo tee /etc/sysctl.d/nextcloud-aio-memory-overcommit.conf
    image: redis:7.4-alpine
    command: >-
      redis-server /usr/local/etc/redis/redis.conf
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 15s
      retries: 1
    restart: unless-stopped
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
        aliases:
          - redis
    volumes:
      - redis-data:/data
      - ./src/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
  rabbitmq:
    image: rabbitmq:4.0-management
    entrypoint: /etc/rabbitmq/init-definitions.sh
    command: rabbitmq-server
    hostname: rabbitmq
    environment:
      # Admin user created on first Mnesia init (replaces default guest user)
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_ADMIN_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_ADMIN_PASS:-admin_dev_pass}
      # Per-service passwords --- init-definitions.sh reads these to generate
      # /etc/rabbitmq/definitions.json at startup (see load_definitions in rabbitmq.conf)
      - RABBITMQ_LISTER_PASS=${RABBITMQ_LISTER_PASS:-lister_dev_pass}
      - RABBITMQ_INDEXER_PASS=${RABBITMQ_INDEXER_PASS:-indexer_dev_pass}
      - RABBITMQ_SEARCH_PASS=${RABBITMQ_SEARCH_PASS:-search_dev_pass}
      - RABBITMQ_ADMIN_PASS=${RABBITMQ_ADMIN_PASS:-admin_dev_pass}
    expose:
      - 5672
      - 15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./src/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./src/rabbitmq/init-definitions.sh:/etc/rabbitmq/init-definitions.sh:ro

    healthcheck:
      test: ["CMD", "rabbitmqctl", "ping"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
        aliases:
          - rabbitmq
  embeddings-server:
    build:
      context: ./src/embeddings-server
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        BASE_TAG: 3.12-slim-multilingual-e5-base
      secrets:
        - HF_TOKEN
    environment:
      - DEVICE=${DEVICE:-cpu}
      - BACKEND=${BACKEND:-torch}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 2g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default:
        aliases:
          - embeddings-server
  document-lister:
    build:
      context: ./src/document-lister
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_LISTER_USER:-lister}
      - RABBITMQ_PASS=${RABBITMQ_LISTER_PASS:-lister_dev_pass}
      - REDIS_HOST=redis
      - QUEUE_NAME=shortembeddings
      - EXCHANGE_NAME=documents
      - BASE_PATH=/data/documents/
      - DOCUMENT_WILDCARD=*.pdf
      - POLL_INTERVAL=60  # seconds between library scans (default: 60)
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "document_lister"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: on-failure
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - document-data:/data/documents
    networks:
      - default
  # Document indexer: e5-base embeddings → books collection
  document-indexer:
    build:
      context: ./src/document-indexer
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_INDEXER_USER:-indexer}
      - RABBITMQ_PASS=${RABBITMQ_INDEXER_PASS:-indexer_dev_pass}
      - REDIS_HOST=redis
      - QUEUE_NAME=shortembeddings
      - EXCHANGE_NAME=documents
      - BASE_PATH=/data/documents/
      - SOLR_HOST=solr
      - SOLR_PORT=8983
      - SOLR_COLLECTION=books
      - EMBEDDINGS_HOST=embeddings-server
      - EMBEDDINGS_PORT=8080
      - CHUNK_SIZE=300
      - CHUNK_OVERLAP=50
      - SOLR_AUTH_USER=${SOLR_ADMIN_USER:-solr_admin}
      - SOLR_AUTH_PASS=${SOLR_ADMIN_PASS:-SolrAdmin_dev2024!}
      - THUMBNAIL_DIR=/data/thumbnails
    restart: on-failure
    stop_grace_period: 10s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      embeddings-server:
        condition: service_healthy
      solr:
        condition: service_healthy
      solr-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "pgrep", "-f", "document_indexer"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - document-data:/data/documents:ro
      - thumbnail-data:/data/thumbnails
    networks:
      - default
  # solr-search: unified search API supporting keyword (Solr BM25), semantic (Solr kNN HNSW),
  # and hybrid (RRF) modes.  Set DEFAULT_SEARCH_MODE=keyword|semantic|hybrid.
  solr-search:
    build:
      context: .
      dockerfile: ./src/solr-search/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    expose:
      - "8080"
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      solr:
        condition: service_healthy
      embeddings-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PORT=8080
      - SOLR_URL=http://solr:8983/solr
      - SOLR_COLLECTION=books
      - SOLR_ASCII_FOLDING=true
      - BASE_PATH=/data/documents
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - EMBEDDINGS_URL=http://embeddings-server:8080/v1/embeddings/
      - DEFAULT_SEARCH_MODE=keyword
      - UPLOAD_DIR=/data/documents/uploads
      - MAX_UPLOAD_SIZE_MB=50
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_SEARCH_USER:-search}
      - RABBITMQ_PASS=${RABBITMQ_SEARCH_PASS:-search_dev_pass}
      - RABBITMQ_QUEUE_NAME=shortembeddings
      - E5_COLLECTIONS=books
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUTH_DB_PATH=${AUTH_DB_PATH:-/data/auth/users.db}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:?error Run python -m installer to generate secrets}
      - AUTH_JWT_TTL=${AUTH_JWT_TTL:-24h}
      - AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME:-aithena_auth}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-100}
      - ZOOKEEPER_HOSTS=zoo1:2181,zoo2:2181,zoo3:2181
      - COLLECTIONS_DB_PATH=${COLLECTIONS_DB_PATH:-/data/collections/collections.db}
      - SOLR_AUTH_USER=${SOLR_READONLY_USER:-solr_read}
      - SOLR_AUTH_PASS=${SOLR_READONLY_PASS:-SolrRead_dev2024!}
    volumes:
      - document-data:/data/documents
      - collections-db:/data/collections
      - type: bind
        source: ${AUTH_DB_DIR:?AUTH_DB_DIR is not set. Run 'python3 -m installer' to generate auth configuration}
        target: /data/auth
    networks:
      - default
  redis-commander:
    image: rediscommander/redis-commander:latest
    expose:
      - "8081"
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http = require('http'); const req = http.get({host: 'localhost', port: 8081, path: '/admin/redis/', timeout: 5000}, (res) => { process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.on('timeout', () => { req.destroy(); process.exit(1); });\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - URL_PREFIX=/admin/redis
    networks:
      - default
  aithena-ui:
    build:
      context: ./src/aithena-ui
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    expose:
      - "8080"
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      solr-search:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default
  nginx:
    image: nginx:1.27-alpine
    entrypoint: ["/docker-entrypoint-solr-auth.sh"]
    command: ["nginx", "-g", "daemon off;"]
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      aithena-ui:
        condition: service_healthy
      solr-search:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      solr:
        condition: service_healthy
    environment:
      SOLR_ADMIN_USER: ${SOLR_ADMIN_USER:-solr_admin}
      SOLR_ADMIN_PASS: ${SOLR_ADMIN_PASS:-SolrAdmin_dev2024!}
      NGINX_ENVSUBST_FILTER: SOLR_BASIC_AUTH
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
    volumes:
      - ./src/nginx/docker-entrypoint-solr-auth.sh:/docker-entrypoint-solr-auth.sh:ro
      - ./src/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./src/nginx/html:/usr/share/nginx/html:ro
      - document-data:/data/documents:ro
      - thumbnail-data:/data/thumbnails:ro
  zoo1:
    image: zookeeper:3.9
    command: ["zkServer.sh", "start-foreground"]
    expose:
      - "2181"
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_CFG_EXTRA: "admin.enableServer=false"
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    volumes:
      - zoo-data1_logs:/logs
      - zoo-data1_data:/data
      - zoo-data1_datalog:/datalog
      - zoo-backup:/backup
    healthcheck:
      # ruok is the canonical ZK liveness check; the previous mntr-based
      # leader/follower test caused broken-pipe noise because grep exits
      # before nc finishes writing the large mntr response.  Solr's own
      # ZK client handles quorum detection, so ruok is sufficient here.
      test: ["CMD-SHELL", "printf ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  zoo2:
    image: zookeeper:3.9
    command: ["zkServer.sh", "start-foreground"]
    expose:
      - "2181"
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_CFG_EXTRA: "admin.enableServer=false"
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    volumes:
      - zoo-data2_logs:/logs
      - zoo-data2_data:/data
      - zoo-data2_datalog:/datalog
      - zoo-backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "printf ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  zoo3:
    image: zookeeper:3.9
    command: ["zkServer.sh", "start-foreground"]
    expose:
      - "2181"
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_CFG_EXTRA: "admin.enableServer=false"
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    volumes:
      - zoo-data3_logs:/logs
      - zoo-data3_data:/data
      - zoo-data3_datalog:/datalog
      - zoo-backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "printf ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  solr:
    build:
      context: ./src/solr
    user: "0:0"  # Run entrypoint as root to fix bind-mount ownership; entrypoint.sh drops to solr (8983) before running docker-entrypoint.sh
    entrypoint: /entrypoint.sh
    command: ["solr-foreground"]
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - solr-data:/var/solr/data
      - document-data:/data/documents:ro
      - ./src/solr/entrypoint.sh:/entrypoint.sh:ro
      - ./src/solr/log4j2.xml:/opt/solr/server/resources/log4j2.xml:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
      SOLR_AUTH_USER: ${SOLR_ADMIN_USER:-solr_admin}
      SOLR_AUTH_PASS: ${SOLR_ADMIN_PASS:-SolrAdmin_dev2024!}
    expose:
      - "8983"
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u $${SOLR_AUTH_USER}:$${SOLR_AUTH_PASS} http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # command: solr-precreate -c books
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
  # second solr node
  solr2:
    build:
      context: ./src/solr
    user: "0:0"  # Run entrypoint.sh as root to fix bind-mount ownership; it drops to solr (8983) via gosu before exec'ing docker-entrypoint.sh
    entrypoint: /entrypoint.sh
    command: ["solr-foreground"]
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - solr-data2:/var/solr/data
      - document-data:/data/documents:ro
      - ./src/solr/entrypoint.sh:/entrypoint.sh:ro
      - ./src/solr/log4j2.xml:/opt/solr/server/resources/log4j2.xml:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
      SOLR_AUTH_USER: ${SOLR_ADMIN_USER:-solr_admin}
      SOLR_AUTH_PASS: ${SOLR_ADMIN_PASS:-SolrAdmin_dev2024!}
    expose:
      - "8983"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u $${SOLR_AUTH_USER}:$${SOLR_AUTH_PASS} http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    #command: solr-create -c books
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
      solr:
        condition: service_healthy
  solr3:
    build:
      context: ./src/solr
    user: "0:0"  # Run entrypoint.sh as root to fix bind-mount ownership; it drops to solr (8983) before execing docker-entrypoint.sh
    entrypoint: /entrypoint.sh
    command: ["solr-foreground"]
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - solr-data3:/var/solr/data
      - document-data:/data/documents:ro
      - ./src/solr/entrypoint.sh:/entrypoint.sh:ro
      - ./src/solr/log4j2.xml:/opt/solr/server/resources/log4j2.xml:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
      SOLR_AUTH_USER: ${SOLR_ADMIN_USER:-solr_admin}
      SOLR_AUTH_PASS: ${SOLR_ADMIN_PASS:-SolrAdmin_dev2024!}
    expose:
      - "8983"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u $${SOLR_AUTH_USER}:$${SOLR_AUTH_PASS} http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    #command: solr-create -c books
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
      solr2:
        condition: service_healthy
  solr-init:
    build:
      context: ./src/solr
    depends_on:
      solr:
        condition: service_healthy
      solr2:
        condition: service_healthy
      solr3:
        condition: service_healthy
    environment:
      SOLR_SECURITY_MANAGER_ENABLED: "false"
      SOLR_ADMIN_USER: ${SOLR_ADMIN_USER:-solr_admin}
      SOLR_ADMIN_PASS: ${SOLR_ADMIN_PASS:-SolrAdmin_dev2024!}
      SOLR_AUTH_USER: ${SOLR_ADMIN_USER:-solr_admin}
      SOLR_AUTH_PASS: ${SOLR_ADMIN_PASS:-SolrAdmin_dev2024!}
      SOLR_READONLY_USER: ${SOLR_READONLY_USER:-solr_read}
      SOLR_READONLY_PASS: ${SOLR_READONLY_PASS:-SolrRead_dev2024!}
    volumes:
      - ./src/solr/books:/configsets/books:ro
      - ./src/solr/add-conf-overlay.sh:/scripts/add-conf-overlay.sh:ro
    entrypoint:
      - /bin/bash
      - -ceu
      - |
          set -o pipefail

          ZK_HOST="zoo1:2181,zoo2:2181,zoo3:2181"
          SOLR_URL="http://solr:8983"

          # Wait for Solr to be reachable (with or without auth)
          until curl -fsS -u "$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASS" "$$SOLR_URL/solr/admin/info/system" >/dev/null 2>&1 || curl -fsS "$$SOLR_URL/solr/admin/info/system" >/dev/null 2>&1; do
            sleep 2
          done

          # Wait for all 3 Solr nodes to join the cluster
          until [ "$$(curl -fsS -u "$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASS" "$$SOLR_URL/solr/admin/collections?action=CLUSTERSTATUS&wt=json" 2>/dev/null | grep -o '"[^"]*:8983_solr"' | sort -u | wc -l | tr -d '[:space:]')" -ge 3 ] 2>/dev/null || \
                [ "$$(curl -fsS "$$SOLR_URL/solr/admin/collections?action=CLUSTERSTATUS&wt=json" 2>/dev/null | grep -o '"[^"]*:8983_solr"' | sort -u | wc -l | tr -d '[:space:]')" -ge 3 ] 2>/dev/null; do
            sleep 2
          done

          # --- Security: Bootstrap BasicAuth + RBAC ---
          # Solr 9.7 BasicAuthPlugin requires >=1 user with hashed password
          # at load time, so we use "solr auth enable" which handles hashing.

          # Check if security is already bootstrapped
          # Unauthenticated request: returns "No authentication" if unconfigured, 401 if configured
          AUTH_RESP=$$(curl -sS "$$SOLR_URL/solr/admin/authentication" 2>/dev/null || true)
          if echo "$$AUTH_RESP" | grep -qi 'No authentication'; then
            echo "Bootstrapping Solr security..."
            # Seed an empty security.json so "solr auth enable" can update it
            echo '{}' > /tmp/empty-security.json
            solr zk cp file:/tmp/empty-security.json zk:/security.json -z "$$ZK_HOST"
            sleep 2

            # Create admin user with hashed password (also creates default RBAC rules)
            solr auth enable --type basicAuth \
              --credentials "$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASS" \
              --block-unknown false \
              --solr-include-file /dev/null \
              -z "$$ZK_HOST"

            echo "Waiting for Solr to load security config..."
            sleep 5

            # Add readonly user
            echo "Adding readonly user..."
            curl -fsS -u "$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASS" \
              "$$SOLR_URL/solr/admin/authentication" \
              -H 'Content-Type: application/json' \
              -d '{"set-user": {"'"$$SOLR_READONLY_USER"'": "'"$$SOLR_READONLY_PASS"'"}}'

            # Assign readonly role
            curl -fsS -u "$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASS" \
              "$$SOLR_URL/solr/admin/authorization" \
              -H 'Content-Type: application/json' \
              -d '{"set-user-role": {"'"$$SOLR_READONLY_USER"'": ["search"]}}'

            echo "Security bootstrap complete."
          else
            echo "Security already configured, skipping bootstrap."
          fi

          # --- books collection (multilingual-e5-base, 768D) ---
          if ! solr zk ls /configs -z "$$ZK_HOST" | grep -qx 'books'; then
            solr zk upconfig -z "$$ZK_HOST" -n books -d /configsets/books
          fi

          if ! curl -fsS -u "$$SOLR_AUTH_USER:$$SOLR_AUTH_PASS" "$$SOLR_URL/solr/admin/collections?action=LIST&wt=json" | grep -q '"books"'; then
            curl -fsS -u "$$SOLR_AUTH_USER:$$SOLR_AUTH_PASS" "$$SOLR_URL/solr/admin/collections?action=CREATE&name=books&collection.configName=books&numShards=1&replicationFactor=3&waitForFinalState=true&wt=json"
          fi

          SOLR_BASE_URL="$$SOLR_URL" SOLR_COLLECTION="books" SOLR_AUTH_USER="$$SOLR_AUTH_USER" SOLR_AUTH_PASS="$$SOLR_AUTH_PASS" sh /scripts/add-conf-overlay.sh

          echo "Solr init complete"
    networks:
      - default
    restart: "no"
