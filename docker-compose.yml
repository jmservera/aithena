services:
  redis:
    # it is importnant to configure OS memory overcommit
    # https://github.com/nextcloud/all-in-one/discussions/1731
    # run this in your VM:
    # echo "vm.overcommit_memory = 1" | sudo tee /etc/sysctl.d/nextcloud-aio-memory-overcommit.conf
    image: redis
    command: redis-server --save 20 1 --loglevel warning
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 15s
      retries: 1
    restart: on-failure
    networks:
      default:
        aliases:
          - redis
    volumes:
      - redis-data:/data
  rabbitmq:
    image: rabbitmq:3.12-management
    command: rabbitmq-server
    hostname: rabbitmq
    expose:
      - 5672
      - 15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

    healthcheck:
      test: ["CMD", "rabbitmqctl", "ping"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    restart: on-failure
    networks:
      default:
        aliases:
          - rabbitmq
  embeddings-server:
    build: ./embeddings-server
    environment:
      - PORT=8085
    expose:
      - "8080"
    restart: on-failure
    networks:
      default:
        aliases:
          - embeddings-server
  document-lister:
    build: ./document-lister
    environment:
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - QUEUE_NAME=shortembeddings
      - BASE_PATH=/data/documents/
      - DOCUMENT_WILDCARD=*.pdf
      - POLL_INTERVAL=60  # seconds between library scans (default: 60)
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    volumes:
      - document-data:/data/documents
    networks:
      - default
  document-indexer:
    build: ./document-indexer
    environment:
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - QUEUE_NAME=shortembeddings
      - BASE_PATH=/data/documents/
      - SOLR_HOST=solr
      - SOLR_PORT=8983
      - SOLR_COLLECTION=books
      - EMBEDDINGS_HOST=embeddings-server
      - EMBEDDINGS_PORT=8085
    restart: on-failure
    deploy:
      replicas: 1
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      embeddings-server:
        condition: service_started
    volumes:
      - document-data:/data/documents:ro
    networks:
      - default
  # solr-search: unified search API supporting keyword (Solr BM25), semantic (Solr kNN HNSW),
  # and hybrid (RRF) modes.  Set DEFAULT_SEARCH_MODE=keyword|semantic|hybrid.
  solr-search:
    build:
      context: .
      dockerfile: ./solr-search/Dockerfile
    expose:
      - "8080"
    restart: on-failure
    depends_on:
      - solr
      - embeddings-server
    environment:
      - PORT=8080
      - SOLR_URL=http://solr:8983/solr
      - SOLR_COLLECTION=books
      - BASE_PATH=/data/documents
      - CORS_ORIGINS=http://localhost:5173
      - EMBEDDINGS_URL=http://embeddings-server:8001/v1/embeddings/
      - DEFAULT_SEARCH_MODE=keyword
    volumes:
      - document-data:/data/documents:ro
    networks:
      - default
  streamlit-admin:
    build: ./admin
    expose:
      - "8501"
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_NAME=shortembeddings
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_MGMT_PORT=15672
      - RABBITMQ_MGMT_PATH_PREFIX=/admin/rabbitmq
    networks:
      - default
  redis-commander:
    image: rediscommander/redis-commander:latest
    expose:
      - "8081"
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOSTS=local:redis:6379
      - URL_PREFIX=/admin/redis
    networks:
      - default
  aithena-ui:
    build: ./aithena-ui
    expose:
      - "80"
    restart: on-failure
    depends_on:
      - solr-search
    networks:
      - default
  nginx:
    image: nginx:1.15-alpine
    restart: unless-stopped
    depends_on:
      aithena-ui:
        condition: service_started
      solr-search:
        condition: service_started
      streamlit-admin:
        condition: service_started
      redis-commander:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      solr:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - certbot-data-conf:/etc/letsencrypt
      - certbot-data-www:/var/www/certbot
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-data-conf:/etc/letsencrypt
      - certbot-data-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  zoo1:
    image: zookeeper:3.9
    expose:
      - "8080"
      - "2181"
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    volumes:
      - zoo-data1_logs:/logs
      - zoo-data1_data:/data
      - zoo-data1_datalog:/datalog
      - zoo-backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "printf ruok | nc -w 2 localhost 2181 | grep -q imok && printf mntr | nc -w 2 localhost 2181 | grep -Eq 'zk_server_state\\s+(leader|follower)'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  zoo2:
    image: zookeeper:3.9
    expose:
      - "2181"
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    volumes:
      - zoo-data2_logs:/logs
      - zoo-data2_data:/data
      - zoo-data2_datalog:/datalog
      - zoo-backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "printf ruok | nc -w 2 localhost 2181 | grep -q imok && printf mntr | nc -w 2 localhost 2181 | grep -Eq 'zk_server_state\\s+(leader|follower)'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  zoo3:
    image: zookeeper:3.9
    expose:
      - "2181"
    networks:
      - default
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,conf,ruok"
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zoo1:2888:3888;2181 server.2=zoo2:2888:3888;2181 server.3=zoo3:2888:3888;2181
    volumes:
      - zoo-data3_logs:/logs
      - zoo-data3_data:/data
      - zoo-data3_datalog:/datalog
      - zoo-backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "printf ruok | nc -w 2 localhost 2181 | grep -q imok && printf mntr | nc -w 2 localhost 2181 | grep -Eq 'zk_server_state\\s+(leader|follower)'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  solr:
    image: solr:9.7
    # build:
    #   context: .
    #   dockerfile: ./solr/Dockerfile
    restart: unless-stopped
    volumes:
      - solr-data:/var/solr/data
      - document-data:/data/documents:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
    expose:
      - "8983"
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # command: solr-precreate -c books
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
  # second solr node
  solr2:
    image: solr:9.7
    # build:
    #   context: .
    #   dockerfile: ./solr/Dockerfile
    restart: unless-stopped
    volumes:
      - solr-data2:/var/solr/data
      - document-data:/data/documents:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
    expose:
      - "8983"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    #command: solr-create -c books
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
      solr:
        condition: service_healthy
  solr3:
    image: solr:9.7
    # build:
    #   context: .
    #   dockerfile: ./solr/Dockerfile
    restart: unless-stopped
    volumes:
      - solr-data3:/var/solr/data
      - document-data:/data/documents:ro
    environment:
      SOLR_MODULES: extraction,langid
      ZK_HOST: "zoo1:2181,zoo2:2181,zoo3:2181"
    expose:
      - "8983"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    #command: solr-create -c books
    depends_on:
      zoo1:
        condition: service_healthy
      zoo2:
        condition: service_healthy
      zoo3:
        condition: service_healthy
      solr2:
        condition: service_healthy
  solr-init:
    image: solr:9.7
    depends_on:
      solr:
        condition: service_healthy
      solr2:
        condition: service_healthy
      solr3:
        condition: service_healthy
    volumes:
      - ./solr/books:/configsets/books:ro
      - ./solr/add-conf-overlay.sh:/scripts/add-conf-overlay.sh:ro
    entrypoint:
      - /bin/bash
      - -ceu
      - |
          set -o pipefail
          ZK_HOST="zoo1:2181,zoo2:2181,zoo3:2181"
          SOLR_URL="http://solr:8983"

          until curl -fsS "$$SOLR_URL/solr/admin/info/system" >/dev/null; do
            sleep 2
          done

          until [ "$$(curl -fsS "$$SOLR_URL/solr/admin/collections?action=CLUSTERSTATUS&wt=json" | grep -o '"[^"]*:8983_solr"' | sort -u | wc -l | tr -d '[:space:]')" -ge 3 ]; do
            sleep 2
          done

          if ! solr zk ls /configs -z "$$ZK_HOST" | grep -q 'books'; then
            solr zk upconfig -z "$$ZK_HOST" -n books -d /configsets/books
          fi

          if ! curl -fsS "$$SOLR_URL/solr/admin/collections?action=LIST&wt=json" | grep -q '"books"'; then
            curl -fsS "$$SOLR_URL/solr/admin/collections?action=CREATE&name=books&collection.configName=books&numShards=1&replicationFactor=3&waitForFinalState=true&wt=json"
          fi

          SOLR_BASE_URL="$$SOLR_URL" SOLR_COLLECTION="books" sh /scripts/add-conf-overlay.sh

          echo "Solr init complete"
    networks:
      - default
    restart: "no"
volumes:
  rabbitmq-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/rabbitmq-data"
  certbot-data-conf:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/certbot-data/conf"
  certbot-data-www:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/certbot-data/www"
  redis-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/redis"
  document-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "${BOOKS_PATH:-/data/booklibrary}"
  solr-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/solr-data"
  solr-data2:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/solr-data2"
  solr-data3:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/solr-data3"
  zoo-data1_logs:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/zoo-data1/logs"
  zoo-data1_data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/zoo-data1/data"
  zoo-data1_datalog:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/zoo-data1/datalog"
  zoo-data2_logs:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/zoo-data2/logs"
  zoo-data2_data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/zoo-data2/data"
  zoo-data2_datalog:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/zoo-data2/datalog"
  zoo-data3_logs:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/zoo-data3/logs"
  zoo-data3_data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/zoo-data3/data"
  zoo-data3_datalog:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/zoo-data3/datalog"
  zoo-backup:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/source/volumes/zoo-backup"
networks:
  default:
