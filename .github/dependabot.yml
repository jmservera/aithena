# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Frontend (React + npm)
  - package-ecosystem: "npm"
    directory: "/src/aithena-ui"
    schedule:
      interval: "weekly"

  # Python services using uv (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/src/solr-search"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/src/document-indexer"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/src/document-lister"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/src/embeddings-server"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/src/admin"
    schedule:
      interval: "weekly"

  # Docker images in docker-compose.yml
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"