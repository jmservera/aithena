# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Frontend (React + npm)
  - package-ecosystem: "npm"
    directory: "/src/aithena-ui"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2

  # Python services using uv (pyproject.toml)
  - package-ecosystem: "uv"
    directory: "/src/solr-search"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2

  - package-ecosystem: "uv"
    directory: "/src/document-indexer"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2

  - package-ecosystem: "uv"
    directory: "/src/document-lister"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2

  - package-ecosystem: "uv"
    directory: "/src/embeddings-server"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2

  - package-ecosystem: "uv"
    directory: "/src/admin"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2

  # Docker images in docker-compose.yml
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7