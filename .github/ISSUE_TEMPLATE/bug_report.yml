name: Bug Report
description: Report a bug with reproduction evidence and root cause analysis
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Please provide detailed reproduction evidence. Per squad policy (R3), no PR should be opened without completing the Reproduction Evidence section.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Exact steps to trigger the bug
      placeholder: |
        1. Navigate to ...
        2. Search for ...
        3. Click on ...
        4. Observe error ...
    validations:
      required: true

  - type: textarea
    id: error-logs
    attributes:
      label: Error Log Output / Stack Trace
      description: Paste relevant error logs, stack traces, or Solr/service error output. Use docker compose logs or browser console.
      render: shell
    validations:
      required: true

  - type: textarea
    id: root-cause-analysis
    attributes:
      label: Root Cause Analysis
      description: |
        What is the actual root cause? "The endpoint returns 502" is a symptom, not a root cause.
        Read the error logs, trace the code path, and explain WHY the error occurs.
      placeholder: |
        - Which service throws the error?
        - What line/function is responsible?
        - Why does this code path fail?
    validations:
      required: true

  - type: textarea
    id: affected-services
    attributes:
      label: Affected Services
      description: Which services are involved?
      placeholder: "e.g., solr-search, embeddings-server, aithena-ui"
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (service down, data loss)
        - High (feature broken, no workaround)
        - Medium (feature broken, workaround exists)
        - Low (cosmetic, minor inconvenience)
    validations:
      required: true
