name: Release Docs

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to document (for example: 0.12.0)'
        required: true
        type: string
      milestone:
        description: 'Optional milestone name used to gather closed issues and merged PRs'
        required: false
        type: string
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version || github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  generate-release-docs:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: Generate release documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INPUT_VERSION: ${{ github.event.inputs.version || github.event.workflow_run.head_branch }}
      INPUT_MILESTONE: ${{ github.event.inputs.milestone }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'

      - name: Normalize release metadata
        id: release
        shell: bash
        run: |
          version="${INPUT_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected version input in the form X.Y.Z or vX.Y.Z, got: ${INPUT_VERSION}" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "release_branch=automation/release-docs-v${version}" >> "$GITHUB_OUTPUT"
          echo "notes_path=docs/release-notes-v${version}.md" >> "$GITHUB_OUTPUT"
          echo "report_path=docs/test-report-v${version}.md" >> "$GITHUB_OUTPUT"

      - name: Collect release context
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_MILESTONE: ${{ env.INPUT_MILESTONE }}
        run: |
          set -euo pipefail

          context_dir="$RUNNER_TEMP/release-docs/context"
          mkdir -p "$context_dir"
          issues_json="$context_dir/issues.json"
          prs_json="$context_dir/prs.json"
          pr_context_note="recent merged PRs on dev"

          if [[ -n "$RELEASE_MILESTONE" ]]; then
            gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state closed \
              --milestone "$RELEASE_MILESTONE" \
              --limit 100 \
              --json number,title,url,closedAt > "$issues_json" || echo '[]' > "$issues_json"
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --state merged \
              --search "repo:$GITHUB_REPOSITORY milestone:\"$RELEASE_MILESTONE\" is:merged" \
              --limit 100 \
              --json number,title,url,mergedAt > "$prs_json" || echo '[]' > "$prs_json"
            if [[ "$(python3 -c 'import json, sys; print(len(json.load(open(sys.argv[1], encoding="utf-8"))))' "$prs_json")" == "0" ]]; then
              gh pr list \
                --repo "$GITHUB_REPOSITORY" \
                --state merged \
                --base dev \
                --limit 20 \
                --json number,title,url,mergedAt > "$prs_json" || echo '[]' > "$prs_json"
              pr_context_note="recent merged PRs on dev fallback (milestone search returned no PRs)"
            else
              pr_context_note="merged PRs tagged with the selected milestone"
            fi
          else
            gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state closed \
              --limit 20 \
              --json number,title,url,closedAt > "$issues_json" || echo '[]' > "$issues_json"
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --state merged \
              --base dev \
              --limit 20 \
              --json number,title,url,mergedAt > "$prs_json" || echo '[]' > "$prs_json"
          fi

          export RELEASE_CONTEXT_DIR="$context_dir"
          export RELEASE_PR_CONTEXT_NOTE="$pr_context_note"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          context_dir = Path(os.environ["RELEASE_CONTEXT_DIR"])
          version = os.environ["RELEASE_VERSION"]
          milestone = os.environ.get("RELEASE_MILESTONE", "").strip()
          pr_context_note = os.environ["RELEASE_PR_CONTEXT_NOTE"]

          issues = json.loads((context_dir / "issues.json").read_text())
          prs = json.loads((context_dir / "prs.json").read_text())

          lines = [
              f"# Release documentation context for v{version}",
              "",
              f"- Milestone filter: {milestone or 'not provided — using recent closed issues and merged PRs on dev'}",
              f"- Pull request source: {pr_context_note}",
              f"- Closed issues captured: {len(issues)}",
              f"- Merged pull requests captured: {len(prs)}",
              "",
              "## Closed issues",
          ]

          if issues:
              for issue in issues:
                  closed_at = issue.get("closedAt") or "unknown close time"
                  lines.append(f"- #{issue['number']} — {issue['title']} ({closed_at})")
                  lines.append(f"  {issue['url']}")
          else:
              lines.append("- No closed issues were returned for the selected filter.")

          lines.extend(["", "## Merged pull requests"])
          if prs:
              for pr in prs:
                  merged_at = pr.get("mergedAt") or "unknown merge time"
                  lines.append(f"- #{pr['number']} — {pr['title']} ({merged_at})")
                  lines.append(f"  {pr['url']}")
          else:
              lines.append("- No merged pull requests were returned for the selected filter.")

          (context_dir / "release-context.md").write_text("\n".join(lines) + "\n")
          PY

      - name: Download latest integration-test artifacts
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          set -euo pipefail

          artifact_dir="$RUNNER_TEMP/release-docs/artifacts"
          mkdir -p "$artifact_dir"

          run_id="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow integration-test.yml \
            --branch dev \
            --status success \
            --limit 20 \
            --json databaseId | python3 -c 'import json, sys; runs = json.load(sys.stdin); print(runs[0]["databaseId"] if runs else "")'
          )"

          if [[ -n "$run_id" ]]; then
            gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --name playwright-e2e-results --dir "$artifact_dir/playwright-e2e-results" || true
            gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --name python-e2e-results --dir "$artifact_dir/python-e2e-results" || true
          fi

          export ARTIFACT_DIR="$artifact_dir"
          python3 - <<'PY'
          import os
          from pathlib import Path

          artifact_dir = Path(os.environ["ARTIFACT_DIR"])
          files = sorted(path for path in artifact_dir.rglob("*") if path.is_file())
          image_suffixes = {".png", ".jpg", ".jpeg", ".webp"}
          images = [path for path in files if path.suffix.lower() in image_suffixes]
          html_reports = [path for path in files if path.suffix.lower() == ".html"]
          xml_reports = [path for path in files if path.suffix.lower() == ".xml"]

          lines = [
              "# Integration test artifact summary",
              "",
              f"- Downloaded files: {len(files)}",
              f"- Screenshot/image files: {len(images)}",
              f"- HTML report files: {len(html_reports)}",
              f"- XML report files: {len(xml_reports)}",
          ]

          if files:
              lines.extend(["", "## Sample artifact paths"])
              for path in files[:20]:
                  lines.append(f"- {path.relative_to(artifact_dir)}")
          else:
              lines.extend(["", "- No prior integration-test artifacts were downloaded. Continue with a documentation template."])

          if images:
              lines.extend(["", "## Screenshot files"])
              for path in images[:20]:
                  lines.append(f"- {path.relative_to(artifact_dir)}")

          (artifact_dir.parent / "context" / "artifact-summary.md").write_text("\n".join(lines) + "\n")
          PY

      - name: Install GitHub Copilot CLI
        id: install_copilot
        shell: bash
        run: |
          set +e

          package='@github/copilot'
          echo "Trying to install ${package}"
          if npm install -g "$package" && command -v copilot >/dev/null 2>&1; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
            echo "package=${package}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "installed=false" >> "$GITHUB_OUTPUT"
          echo "package=" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate docs with Copilot CLI
        id: copilot
        if: steps.install_copilot.outputs.installed == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_MILESTONE: ${{ env.INPUT_MILESTONE }}
          RELEASE_NOTES_PATH: ${{ steps.release.outputs.notes_path }}
          TEST_REPORT_PATH: ${{ steps.release.outputs.report_path }}
        run: |
          set +e

          mkdir -p docs
          prompt_file="$RUNNER_TEMP/release-docs/copilot-prompt.txt"
          context_dir="$RUNNER_TEMP/release-docs/context"
          artifact_dir="$RUNNER_TEMP/release-docs/artifacts"

          cat > "$prompt_file" <<EOF
          Newt: generate release docs for v${RELEASE_VERSION}.

          Read these style guides first:
          - docs/release-notes-v0.11.0.md
          - docs/test-report-v0.11.0.md

          Read these generated context files:
          - ${context_dir}/release-context.md
          - ${context_dir}/artifact-summary.md

          Produce these files in the repository working tree:
          - ${RELEASE_NOTES_PATH}
          - ${TEST_REPORT_PATH}

          Requirements:
          - Use today's UTC date.
          - Mention the selected milestone when one was provided: ${RELEASE_MILESTONE:-none provided}.
          - Summarize merged PRs and relevant closed issues from the generated context.
          - Treat integration-test screenshots and reports as optional supporting evidence.
          - If evidence is incomplete, note TODOs or placeholders instead of inventing test outcomes.
          - The workflow is an automation aid, not a release blocker.
          - Write concise, reviewable markdown in Newt's release-doc voice.
          EOF

          copilot --agent squad --autopilot -p "$(cat "$prompt_file")" --allow-all-tools
          status=$?

          if [[ $status -eq 0 && -s "$RELEASE_NOTES_PATH" && -s "$TEST_REPORT_PATH" ]]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Generate fallback documentation templates
        if: steps.copilot.outputs.success != 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_MILESTONE: ${{ env.INPUT_MILESTONE }}
          RELEASE_NOTES_PATH: ${{ steps.release.outputs.notes_path }}
          TEST_REPORT_PATH: ${{ steps.release.outputs.report_path }}
        run: |
          set -euo pipefail

          mkdir -p docs
          export RELEASE_CONTEXT_DIR="$RUNNER_TEMP/release-docs/context"
          export RELEASE_ARTIFACT_DIR="$RUNNER_TEMP/release-docs/artifacts"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from datetime import datetime, timezone

          context_dir = Path(os.environ["RELEASE_CONTEXT_DIR"])
          artifact_dir = Path(os.environ["RELEASE_ARTIFACT_DIR"])
          version = os.environ["RELEASE_VERSION"]
          milestone = os.environ.get("RELEASE_MILESTONE", "").strip()
          notes_path = Path(os.environ["RELEASE_NOTES_PATH"])
          report_path = Path(os.environ["TEST_REPORT_PATH"])
          date_str = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          issues = json.loads((context_dir / "issues.json").read_text()) if (context_dir / "issues.json").exists() else []
          prs = json.loads((context_dir / "prs.json").read_text()) if (context_dir / "prs.json").exists() else []
          artifact_files = sorted(path for path in artifact_dir.rglob("*") if path.is_file()) if artifact_dir.exists() else []
          image_suffixes = {".png", ".jpg", ".jpeg", ".webp"}
          screenshots = [path.relative_to(artifact_dir) for path in artifact_files if path.suffix.lower() in image_suffixes]

          notes_lines = [
              f"# Aithena v{version} Release Notes — Draft",
              "",
              f"_Date:_ {date_str}  ",
              "_Prepared by:_ Copilot release-docs workflow (template fallback)",
              "",
              f"Aithena v{version} release notes draft generated automatically{f' for the **{milestone}** milestone' if milestone else ''}. This is a starting point for Newt to review and refine before release approval.",
              "",
              "## Summary of shipped changes",
              "",
              "- Template generated because Copilot CLI was unavailable or the automated generation step did not complete successfully.",
              f"- Closed issues captured: {len(issues)}",
              f"- Merged pull requests captured: {len(prs)}",
              f"- Integration-test artifacts available: {'yes' if artifact_files else 'no'}",
              "",
              "## Merged pull requests",
          ]

          if prs:
              for pr in prs:
                  notes_lines.append(f"- **#{pr['number']}** — {pr['title']}")
          else:
              notes_lines.append("- _No merged pull requests were collected automatically. Add release PRs manually._")

          notes_lines.extend(["", "## Closed issues"])
          if issues:
              for issue in issues:
                  notes_lines.append(f"- **#{issue['number']}** — {issue['title']}")
          else:
              notes_lines.append("- _No closed issues were collected automatically. Add milestone issues manually if needed._")

          notes_lines.extend([
              "",
              "## Breaking changes",
              "",
              "**TBD during release review.**",
              "",
              "## Upgrade instructions",
              "",
              "1. Review the merged PR list above and replace placeholders with operator-facing upgrade steps.",
              "2. Confirm whether any configuration, auth, or deployment changes require documentation updates.",
              "3. Attach or reference integration-test screenshots if they help illustrate UI or admin changes.",
          ])

          report_lines = [
              f"# Aithena v{version} Test Report",
              "",
              f"_Date:_ {date_str}  ",
              "_Prepared by:_ Copilot release-docs workflow (template fallback)",
              "",
              "## Scope and evidence collected",
              "",
              "This template was generated automatically. Replace placeholders with the final release validation results.",
              "",
              "## Executive summary",
              "",
              "- **Overall result:** TEMPLATE — pending human validation",
              "- **Release gate decision:** This automation is a documentation aid and should not block release preparation on its own.",
              "",
              "## CI status summary",
              "",
              "- Add the latest CI, security, and integration-test workflow results here.",
              "",
              "## Artifact evidence",
              "",
              f"- Downloaded artifact files: {len(artifact_files)}",
              f"- Screenshot files: {len(screenshots)}",
          ]

          if screenshots:
              report_lines.append("")
              report_lines.append("### Screenshot files")
              report_lines.append("")
              for screenshot in screenshots[:20]:
                  report_lines.append(f"- `{screenshot}`")
          else:
              report_lines.extend(["", "- No integration-test screenshots were available to attach automatically."])

          report_lines.extend([
              "",
              "## Manual validation checklist",
              "",
              "- [ ] Confirm release notes reflect the final merged scope.",
              "- [ ] Record current CI and integration-test outcomes.",
              "- [ ] Add notes for any known issues, workarounds, or follow-up items.",
              "- [ ] Confirm whether screenshots should be embedded or linked.",
              "",
              "## Known issues and follow-up",
              "",
              "- Add any release caveats, deferred fixes, or post-release monitoring notes here.",
          ])

          notes_path.write_text("\n".join(notes_lines) + "\n")
          report_path.write_text("\n".join(report_lines) + "\n")
          PY

      - name: Commit generated docs and open PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_BRANCH: ${{ steps.release.outputs.release_branch }}
          RELEASE_NOTES_PATH: ${{ steps.release.outputs.notes_path }}
          TEST_REPORT_PATH: ${{ steps.release.outputs.report_path }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$RELEASE_BRANCH"
          git add "$RELEASE_NOTES_PATH" "$TEST_REPORT_PATH"

          if git diff --cached --quiet; then
            echo "No release documentation changes detected; nothing to commit."
            exit 0
          fi

          git commit -F- <<EOF
          docs: prepare release docs for v${RELEASE_VERSION}

          Generated by the release-docs workflow.

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>
          EOF

          git push --force-with-lease "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${RELEASE_BRANCH}"

          existing_pr="$(gh pr list --repo "$GITHUB_REPOSITORY" --base dev --head "$RELEASE_BRANCH" --json url --jq '.[0].url')"
          if [[ -n "$existing_pr" ]]; then
            echo "Updated existing PR: $existing_pr"
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base dev \
            --head "$RELEASE_BRANCH" \
            --title "docs: prepare release docs for v${RELEASE_VERSION}" \
            --body "Automated release documentation for v${RELEASE_VERSION}.\n\nGenerated files:\n- ${RELEASE_NOTES_PATH}\n- ${TEST_REPORT_PATH}"
