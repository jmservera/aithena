name: Close Dependabot PRs after Batch Merge

# Triggers when a batch dependency PR is merged into dev
on:
  pull_request:
    types: [closed]
    branches: [dev]

permissions:
  pull-requests: write
  contents: read

jobs:
  close-originals:
    name: Close included Dependabot PRs
    runs-on: ubuntu-latest
    # Only run when a dependabot:batch PR is actually merged (not just closed)
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'dependabot:batch')
    steps:
      - name: Extract included PR numbers from body
        id: extract
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Get the batch PR body
          BODY=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body --jq '.body')

          # Extract PR numbers from the table rows (format: | #1234 | ✅ merged | ... |)
          INCLUDED=$(echo "$BODY" | grep -oP '#\K[0-9]+' | sort -un | tr '\n' ',' | sed 's/,$//')

          if [ -z "$INCLUDED" ]; then
            echo "No PR numbers found in batch PR body"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "prs=${INCLUDED}" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$INCLUDED" | tr ',' '\n' | wc -l)
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Found ${COUNT} PRs to close: ${INCLUDED}"

      - name: Close included PRs
        if: steps.extract.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          INCLUDED_PRS: ${{ steps.extract.outputs.prs }}
          BATCH_PR: ${{ github.event.pull_request.number }}
        run: |
          CLOSED=0
          for num in $(echo "$INCLUDED_PRS" | tr ',' ' '); do
            # Only close if it's still open and is a dependabot PR
            STATE=$(gh pr view "$num" --repo "$GITHUB_REPOSITORY" --json state,author --jq 'select(.author.login == "app/dependabot") | .state' 2>/dev/null || true)
            if [ "$STATE" = "OPEN" ]; then
              echo "Closing PR #${num}..."
              gh pr close "$num" --repo "$GITHUB_REPOSITORY" \
                --comment "🤖 Included in batch dependency update #${BATCH_PR}. Changes are now on dev." \
                2>/dev/null && CLOSED=$((CLOSED + 1)) || echo "⚠️ Could not close #${num}"
            else
              echo "Skipping #${num} (state: ${STATE:-not found/not dependabot})"
            fi
          done
          echo "Closed ${CLOSED} dependabot PRs"
