name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Extract Dependabot metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}
      dependency-names: ${{ steps.metadata.outputs.dependency-names }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a  # v2.5.0

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    needs: metadata
    strategy:
      matrix:
        service:
          - document-indexer
          - document-lister
          - solr-search
          - embeddings-server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv (for uv-managed services)
        if: matrix.service != 'embeddings-server'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: src/${{ matrix.service }}/uv.lock

      - name: Install dependencies (uv-managed)
        if: matrix.service != 'embeddings-server'
        working-directory: src/${{ matrix.service }}
        run: uv sync --frozen

      - name: Install dependencies (embeddings-server)
        if: matrix.service == 'embeddings-server'
        working-directory: src/embeddings-server
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest==8.3.4 httpx==0.27.2

      - name: Run tests
        working-directory: src/${{ matrix.service }}
        run: |
          if [ "${{ matrix.service }}" != "embeddings-server" ]; then
            uv run pytest -v --tb=short
          else
            python -m pytest -v --tb=short
          fi

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    needs: metadata
    defaults:
      run:
        working-directory: src/aithena-ui
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/aithena-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

  security-checks:
    name: Security validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    needs: metadata
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Check for known vulnerabilities
        run: |
          echo "Security check: Verifying no new high/critical vulnerabilities introduced"
          # This is a placeholder - GitHub's Dependabot alerts are checked automatically
          # Additional security scans can be added here if needed
          exit 0

  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    needs: [metadata, python-tests, frontend-tests, security-checks]
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      (needs.metadata.outputs.update-type == 'version-update:semver-patch' ||
       needs.metadata.outputs.update-type == 'version-update:semver-minor')
    steps:
      - name: Auto-merge patch/minor updates
        id: auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr review "$PR_NUMBER" --repo "$REPO" --approve --body "Auto-approved: patch/minor dependency update with all tests passing"
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash

      - name: Add auto-merge label
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "dependabot:auto-merge"

      - name: Report merge failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "dependabot:manual-review"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "❌ **Auto-merge failed** — this PR needs manual attention. Tests passed but the merge step encountered an error."

  manual-review:
    name: Flag for manual review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    needs: [metadata, python-tests, frontend-tests, security-checks]
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      needs.metadata.outputs.update-type == 'version-update:semver-major'
    steps:
      - name: Add manual review label
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "dependabot:manual-review"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "⚠️ **Major version update** - Manual review required before merging. All tests have passed."