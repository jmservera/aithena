name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Extract Dependabot metadata
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}
      dependency-names: ${{ steps.metadata.outputs.dependency-names }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@42fe8f20073db6b1b8c665c2bbef5f4db85bb93a  # v2.3.0

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    needs: metadata
    strategy:
      matrix:
        service:
          - document-indexer
          - document-lister
          - solr-search
          - embeddings-server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install uv (for uv-managed services)
        if: matrix.service != 'embeddings-server'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: src/${{ matrix.service }}/uv.lock

      - name: Install dependencies (uv-managed)
        if: matrix.service != 'embeddings-server'
        working-directory: src/${{ matrix.service }}
        run: uv sync --frozen

      - name: Install dependencies (embeddings-server)
        if: matrix.service == 'embeddings-server'
        working-directory: src/embeddings-server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: src/${{ matrix.service }}
        run: |
          if [ -f pyproject.toml ]; then
            uv run pytest -v --tb=short
          else
            pytest -v --tb=short
          fi

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    needs: metadata
    defaults:
      run:
        working-directory: src/aithena-ui
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/aithena-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

  security-checks:
    name: Security validation
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    needs: metadata
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Check for known vulnerabilities
        run: |
          echo "Security check: Verifying no new high/critical vulnerabilities introduced"
          # This is a placeholder - GitHub's Dependabot alerts are checked automatically
          # Additional security scans can be added here if needed
          exit 0

  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: [metadata, python-tests, frontend-tests, security-checks]
    if: |
      github.actor == 'dependabot[bot]' &&
      (needs.metadata.outputs.update-type == 'version-update:semver-patch' ||
       needs.metadata.outputs.update-type == 'version-update:semver-minor')
    steps:
      - name: Auto-merge patch/minor updates
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr review "$PR_NUMBER" --approve --body "Auto-approved: patch/minor dependency update with all tests passing"
          gh pr merge "$PR_NUMBER" --auto --squash
        continue-on-error: true

      - name: Add auto-merge label
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr edit "$PR_NUMBER" --add-label "dependabot:auto-merge"

  manual-review:
    name: Flag for manual review
    runs-on: ubuntu-latest
    needs: [metadata, python-tests, frontend-tests, security-checks]
    if: |
      github.actor == 'dependabot[bot]' &&
      needs.metadata.outputs.update-type == 'version-update:semver-major'
    steps:
      - name: Add manual review label
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR_NUMBER" --add-label "dependabot:manual-review"
          gh pr comment "$PR_NUMBER" --body "⚠️ **Major version update** - Manual review required before merging. All tests have passed."
