name: Dependabot Batch Merge

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run — list PRs without merging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      include-minor:
        description: "Include minor version updates"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    # Run weekly on Monday at 06:00 UTC — after dependabot's default Sunday schedule
    - cron: "0 6 * * 1"

permissions: read-all

concurrency:
  group: dependabot-batch-merge
  cancel-in-progress: false

env:
  CONSOLIDATION_BRANCH_PREFIX: dependabot/batch

jobs:
  collect-prs:
    name: Collect Dependabot PRs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr-count: ${{ steps.collect.outputs.pr-count }}
      pr-numbers: ${{ steps.collect.outputs.pr-numbers }}
      pr-json: ${{ steps.collect.outputs.pr-json }}
      batch-branch: ${{ steps.collect.outputs.batch-branch }}
    steps:
      - name: Collect eligible PRs
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
          INCLUDE_MINOR: ${{ inputs.include-minor || 'true' }}
        run: |
          BATCH_DATE=$(date +%Y-%m-%d)
          BATCH_BRANCH="${{ env.CONSOLIDATION_BRANCH_PREFIX }}-${BATCH_DATE}"
          echo "batch-branch=${BATCH_BRANCH}" >> "$GITHUB_OUTPUT"

          # Fetch all open dependabot PRs targeting dev
          ALL_PRS=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --base dev --state open --author "app/dependabot" \
            --json number,title,headRefName \
            --limit 100 2>/dev/null || echo "[]")

          if [ "$ALL_PRS" = "[]" ] || [ -z "$ALL_PRS" ]; then
            echo "No open Dependabot PRs found"
            echo "pr-count=0" >> "$GITHUB_OUTPUT"
            echo "pr-numbers=" >> "$GITHUB_OUTPUT"
            echo "pr-json=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Filter: exclude major version bumps
          ELIGIBLE='[]'
          while IFS= read -r pr; do
            NUMBER=$(echo "$pr" | jq -r '.number')
            TITLE=$(echo "$pr" | jq -r '.title')
            HEAD=$(echo "$pr" | jq -r '.headRefName')

            FROM_VER=$(echo "$TITLE" | grep -oP 'from \K[0-9]+\.[0-9]+(\.[0-9]+)?' || true)
            TO_VER=$(echo "$TITLE" | grep -oP 'to \K[0-9]+\.[0-9]+(\.[0-9]+)?' || true)

            if [ -n "$FROM_VER" ] && [ -n "$TO_VER" ]; then
              FROM_MAJOR=$(echo "$FROM_VER" | cut -d. -f1)
              TO_MAJOR=$(echo "$TO_VER" | cut -d. -f1)
              FROM_MINOR=$(echo "$FROM_VER" | cut -d. -f2)
              TO_MINOR=$(echo "$TO_VER" | cut -d. -f2)

              # Skip major bumps
              if [ "$FROM_MAJOR" != "$TO_MAJOR" ]; then
                echo "⚠️ Skipping #${NUMBER} (major bump): $TITLE"
                continue
              fi

              # Skip minor bumps if not included
              if [ "$FROM_MINOR" != "$TO_MINOR" ] && [ "$INCLUDE_MINOR" != "true" ]; then
                echo "⏭️ Skipping #${NUMBER} (minor bump, not included): $TITLE"
                continue
              fi
            else
              # Can't parse versions — treat as ineligible for safety
              echo "⚠️ Skipping #${NUMBER} (unparseable version): $TITLE"
              continue
            fi

            echo "✅ Including #${NUMBER}: $TITLE"
            ELIGIBLE=$(echo "$ELIGIBLE" | jq --argjson pr "$pr" '. + [$pr]')
          done < <(echo "$ALL_PRS" | jq -c '.[]')

          COUNT=$(echo "$ELIGIBLE" | jq 'length')
          NUMBERS=$(echo "$ELIGIBLE" | jq -r '[.[].number] | join(",")')

          echo "pr-count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "pr-numbers=${NUMBERS}" >> "$GITHUB_OUTPUT"
          echo "pr-json=$(echo "$ELIGIBLE" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "Found ${COUNT} eligible PRs: ${NUMBERS}"

  consolidate:
    name: Consolidate branches
    runs-on: ubuntu-latest
    needs: collect-prs
    if: |
      needs.collect-prs.outputs.pr-count != '0' &&
      (inputs.dry-run || 'false') != 'true'
    permissions:
      contents: write
      pull-requests: read
    outputs:
      merged-prs: ${{ steps.merge-branches.outputs.merged-prs }}
      failed-prs: ${{ steps.merge-branches.outputs.failed-prs }}
      merged-count: ${{ steps.merge-branches.outputs.merged-count }}
      has-changes: ${{ steps.merge-branches.outputs.has-changes }}
      summary: ${{ steps.merge-branches.outputs.summary }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "22"

      - name: Create consolidation branch
        env:
          BATCH_BRANCH: ${{ needs.collect-prs.outputs.batch-branch }}
        run: |
          git checkout -b "$BATCH_BRANCH"

      - name: Merge each PR branch
        id: merge-branches
        env:
          GH_TOKEN: ${{ github.token }}
          PR_JSON: ${{ needs.collect-prs.outputs.pr-json }}
          BATCH_BRANCH: ${{ needs.collect-prs.outputs.batch-branch }}
        run: |
          MERGED_PRS=""
          FAILED_PRS=""
          SUMMARY=""

          while IFS= read -r pr; do
            NUMBER=$(echo "$pr" | jq -r '.number')
            TITLE=$(echo "$pr" | jq -r '.title')
            HEAD=$(echo "$pr" | jq -r '.headRefName')

            echo "::group::Merging #${NUMBER}: ${TITLE}"

            # Fetch the PR branch
            if ! git fetch origin "$HEAD" 2>/dev/null; then
              echo "❌ Failed to fetch branch ${HEAD}"
              FAILED_PRS="${FAILED_PRS:+${FAILED_PRS},}${NUMBER}"
              SUMMARY="${SUMMARY}\n| #${NUMBER} | ❌ fetch failed | ${TITLE} |"
              echo "::endgroup::"
              continue
            fi

            # Attempt merge
            if git merge "origin/${HEAD}" --no-edit -m "Merge dependabot PR #${NUMBER}: ${TITLE}"; then
              echo "✅ Merged #${NUMBER}"
              MERGED_PRS="${MERGED_PRS:+${MERGED_PRS},}${NUMBER}"
              SUMMARY="${SUMMARY}\n| #${NUMBER} | ✅ merged | ${TITLE} |"
            else
              echo "⚠️ Merge conflict on #${NUMBER}, attempting lockfile regeneration..."

              # Check which files conflict
              CONFLICTS=$(git diff --name-only --diff-filter=U 2>/dev/null || true)
              RESOLVED=true

              # Regenerate lockfiles for conflicting files
              for conflict in $CONFLICTS; do
                case "$conflict" in
                  src/*/uv.lock)
                    SVC_DIR=$(dirname "$conflict")
                    echo "Regenerating uv.lock in ${SVC_DIR}..."
                    git checkout --theirs "$conflict"
                    git add "$conflict"
                    (cd "$SVC_DIR" && uv lock 2>/dev/null) || true
                    if [ -f "$conflict" ]; then
                      git add "$conflict"
                    fi
                    ;;
                  src/aithena-ui/package-lock.json)
                    echo "Regenerating package-lock.json..."
                    git checkout --theirs "$conflict"
                    git add "$conflict"
                    (cd src/aithena-ui && npm install --package-lock-only 2>/dev/null) || true
                    git add "$conflict"
                    ;;
                  *)
                    echo "❌ Cannot auto-resolve conflict in ${conflict}"
                    RESOLVED=false
                    ;;
                esac
              done

              if [ "$RESOLVED" = true ] && [ -z "$(git diff --name-only --diff-filter=U 2>/dev/null)" ]; then
                if git commit --no-edit -m "Merge dependabot PR #${NUMBER}: ${TITLE} (lockfile regenerated)" 2>/dev/null; then
                  echo "✅ Merged #${NUMBER} (with lockfile regen)"
                  MERGED_PRS="${MERGED_PRS:+${MERGED_PRS},}${NUMBER}"
                  SUMMARY="${SUMMARY}\n| #${NUMBER} | ✅ merged (lockfile regen) | ${TITLE} |"
                else
                  echo "❌ Failed to create merge commit for #${NUMBER} after lockfile regeneration"
                  git merge --abort 2>/dev/null || git reset --hard HEAD
                  FAILED_PRS="${FAILED_PRS:+${FAILED_PRS},}${NUMBER}"
                  SUMMARY="${SUMMARY}\n| #${NUMBER} | ❌ merge commit failed after lockfile regen | ${TITLE} |"
                fi
              else
                echo "❌ Cannot resolve conflicts for #${NUMBER}"
                git merge --abort 2>/dev/null || git reset --hard HEAD
                FAILED_PRS="${FAILED_PRS:+${FAILED_PRS},}${NUMBER}"
                SUMMARY="${SUMMARY}\n| #${NUMBER} | ❌ conflict | ${TITLE} |"
              fi
            fi

            echo "::endgroup::"
          done < <(echo "$PR_JSON" | jq -c '.[]')

          MERGED_COUNT=$(echo "$MERGED_PRS" | tr ',' '\n' | grep -c '[0-9]' || echo "0")

          echo "merged-prs=${MERGED_PRS}" >> "$GITHUB_OUTPUT"
          echo "failed-prs=${FAILED_PRS}" >> "$GITHUB_OUTPUT"
          echo "merged-count=${MERGED_COUNT}" >> "$GITHUB_OUTPUT"
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ "$MERGED_COUNT" -gt 0 ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.merge-branches.outputs.has-changes == 'true'
        run: |
          CURRENT=$(cat VERSION)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "$NEW_VERSION" > VERSION
          git add VERSION
          git commit -m "chore: bump version ${CURRENT} → ${NEW_VERSION} (batch dependency update)"
          echo "Version bumped: ${CURRENT} → ${NEW_VERSION}"

      - name: Push consolidation branch
        if: steps.merge-branches.outputs.has-changes == 'true'
        env:
          BATCH_BRANCH: ${{ needs.collect-prs.outputs.batch-branch }}
        run: git push origin "$BATCH_BRANCH" --force-with-lease

  # CI runs automatically when the PR is opened (via normal PR triggers on dev).
  # No separate ci-tests job needed — branch protection requires CI to pass before merge.

  open-pr:
    name: Open consolidated PR
    runs-on: ubuntu-latest
    needs: [collect-prs, consolidate]
    if: needs.consolidate.outputs.has-changes == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create consolidated PR
        env:
          GH_TOKEN: ${{ github.token }}
          BATCH_BRANCH: ${{ needs.collect-prs.outputs.batch-branch }}
          MERGED_PRS: ${{ needs.consolidate.outputs.merged-prs }}
          FAILED_PRS: ${{ needs.consolidate.outputs.failed-prs }}
          MERGED_COUNT: ${{ needs.consolidate.outputs.merged-count }}
          SUMMARY: ${{ needs.consolidate.outputs.summary }}
        run: |
          # Build PR body
          BODY="## 🤖 Dependabot Batch Update"
          BODY="${BODY}\n\nThis PR consolidates **${MERGED_COUNT}** dependabot dependency updates into a single merge."
          BODY="${BODY}\n\n### Included PRs\n"
          BODY="${BODY}\n| PR | Status | Description |"
          BODY="${BODY}\n|---|---|---|"
          BODY="${BODY}\n${SUMMARY}"

          if [ -n "$FAILED_PRS" ]; then
            BODY="${BODY}\n\n### ⚠️ PRs that could not be included"
            BODY="${BODY}\nThe following PRs had unresolvable conflicts and need manual attention: ${FAILED_PRS}"
          fi

          BODY="${BODY}\n\n---"
          BODY="${BODY}\n*Created by the [Dependabot Batch Merge](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.*"
          BODY="${BODY}\n*After merging, the close-dependabot-batch workflow closes the included PRs automatically; manually close them only if that cleanup does not complete.*"

          echo -e "$BODY" > pr_body.txt

          gh pr create --repo "$GITHUB_REPOSITORY" \
            --base dev \
            --head "$BATCH_BRANCH" \
            --title "chore(deps): batch dependency update $(date +%Y-%m-%d) (${MERGED_COUNT} PRs)" \
            --body-file pr_body.txt \
            --label "dependencies,dependabot:batch"

          rm -f pr_body.txt

  # Close originals only when the batch PR is actually merged (triggered separately)
  close-originals:
    name: Close original PRs after batch merge
    runs-on: ubuntu-latest
    # This job only runs when triggered by pull_request closed+merged event
    # For workflow_dispatch/schedule runs, it is skipped
    if: false
    permissions:
      pull-requests: write
    steps:
      - name: Placeholder
        run: echo "See close-dependabot-batch.yml for post-merge cleanup"

  dry-run-report:
    name: Dry run report
    runs-on: ubuntu-latest
    needs: collect-prs
    if: |
      (inputs.dry-run || 'false') == 'true' &&
      needs.collect-prs.outputs.pr-count != '0'
    permissions:
      contents: read
    steps:
      - name: Report eligible PRs
        env:
          PR_JSON: ${{ needs.collect-prs.outputs.pr-json }}
          PR_COUNT: ${{ needs.collect-prs.outputs.pr-count }}
        run: |
          echo "## Dry Run Report"
          echo ""
          echo "Found **${PR_COUNT}** eligible PRs that would be included in a batch merge:"
          echo ""
          echo "| PR | Title |"
          echo "|---|---|"
          echo "$PR_JSON" | jq -r '.[] | "| #\(.number) | \(.title) |"'
          echo ""
          echo "Run again without dry-run to create the consolidated branch."
