name: Pre-release Containers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version without v prefix (e.g. 1.16.0)'
        required: true
        type: string
      rc_number:
        description: 'RC number (leave empty to auto-increment from existing tags)'
        required: false
        type: string

  pull_request:
    branches: [main]

  push:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare RC version
    runs-on: ubuntu-latest
    # Skip PR builds from forks (they lack push/package permissions)
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'push'
      || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      rc_number: ${{ steps.resolve.outputs.rc_number }}
      full_tag: ${{ steps.resolve.outputs.full_tag }}
      build_date: ${{ steps.resolve.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve version and RC number
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_RC: ${{ inputs.rc_number }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          # --- Determine version ---
          if [[ -n "${INPUT_VERSION:-}" ]]; then
            version="$INPUT_VERSION"
          elif [[ -f VERSION ]]; then
            version="$(tr -d '[:space:]' < VERSION)"
          else
            echo "::error::No version input and VERSION file not found"
            exit 1
          fi

          # Validate semver format
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $version (expected X.Y.Z)"
            exit 1
          fi

          echo "Using version: $version"

          # --- Determine RC number ---
          if [[ -n "${INPUT_RC:-}" ]]; then
            rc_number="$INPUT_RC"
            echo "Using manual RC number: $rc_number"
          else
            echo "Auto-detecting next RC number..."

            # Query ghcr.io for existing tags on the admin image
            # The packages API lists versions for the container
            max_rc=0

            # Use GitHub API to list package versions and find existing RC tags
            owner="${REPO%%/*}"
            response=$(gh api \
              "/users/${owner}/packages/container/aithena-admin/versions" \
              --paginate \
              --jq ".[].metadata.container.tags[]" 2>/dev/null || true)

            if [[ -n "$response" ]]; then
              # Find highest rc.N for this version
              while IFS= read -r tag; do
                if [[ "$tag" =~ ^${version}-rc\.([0-9]+)$ ]]; then
                  n="${BASH_REMATCH[1]}"
                  if (( n > max_rc )); then
                    max_rc=$n
                  fi
                fi
              done <<< "$response"
            fi

            rc_number=$(( max_rc + 1 ))
            echo "Auto-incremented RC number: $rc_number (previous highest: $max_rc)"
          fi

          full_tag="${version}-rc.${rc_number}"
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "rc_number=$rc_number" >> "$GITHUB_OUTPUT"
          echo "full_tag=$full_tag" >> "$GITHUB_OUTPUT"
          echo "build_date=$build_date" >> "$GITHUB_OUTPUT"

          echo "### Pre-release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`$version\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| RC Number | \`$rc_number\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Full Tag | \`$full_tag\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Date | \`$build_date\` |" >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    name: Build and push RC containers
    needs: prepare
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-containers.yml
    with:
      version: ${{ needs.prepare.outputs.full_tag }}
      push: ${{ github.event_name != 'pull_request' }}
      tags: |
        type=raw,value=${{ needs.prepare.outputs.full_tag }}
      build-date: ${{ needs.prepare.outputs.build_date }}
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

  smoke-test:
    name: Smoke test ${{ matrix.service.image }}${{ matrix.service.tag_suffix || '' }}
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-and-push
    # Only run when images were actually pushed (skip PR dry-runs)
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - image: solr-search
            type: http
            port: "8080"
            health_endpoint: /health
            startup_timeout: 30
          - image: embeddings-server
            type: http
            port: "8080"
            health_endpoint: /health
            startup_timeout: 60
          - image: embeddings-server
            type: http
            port: "8080"
            health_endpoint: /health
            startup_timeout: 60
            tag_suffix: "-openvino"
          - image: admin
            type: http
            port: "8501"
            health_endpoint: /admin/streamlit/_stcore/health
            startup_timeout: 60
          - image: aithena-ui
            type: http
            port: "8080"
            health_endpoint: /health
            startup_timeout: 15
          - image: document-lister
            type: process
          - image: document-indexer
            type: process
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          SERVICE_IMAGE: ${{ matrix.service.image }}
          RC_TAG: ${{ needs.prepare.outputs.full_tag }}${{ matrix.service.tag_suffix || '' }}
        run: docker pull "ghcr.io/jmservera/aithena-${SERVICE_IMAGE}:${RC_TAG}"

      - name: Start container and check health endpoint
        if: matrix.service.type == 'http'
        env:
          SERVICE_IMAGE: ${{ matrix.service.image }}
          RC_TAG: ${{ needs.prepare.outputs.full_tag }}${{ matrix.service.tag_suffix || '' }}
          SERVICE_PORT: ${{ matrix.service.port }}
          HEALTH_ENDPOINT: ${{ matrix.service.health_endpoint }}
          STARTUP_TIMEOUT: ${{ matrix.service.startup_timeout }}
        run: |
          image="ghcr.io/jmservera/aithena-${SERVICE_IMAGE}:${RC_TAG}"
          port="${SERVICE_PORT}"
          endpoint="${HEALTH_ENDPOINT}"
          timeout="${STARTUP_TIMEOUT}"

          docker run -d --name smoke-container -p "${port}:${port}" "${image}"

          elapsed=0
          echo "Waiting up to ${timeout}s for ${SERVICE_IMAGE} at :${port}${endpoint}..."
          while [ "$elapsed" -lt "$timeout" ]; do
            if curl -sf "http://localhost:${port}${endpoint}" > /dev/null 2>&1; then
              echo "✅ ${SERVICE_IMAGE} is healthy after ${elapsed}s"
              exit 0
            fi
            # Fail fast if the container exited
            if ! docker inspect --format='{{.State.Running}}' smoke-container 2>/dev/null | grep -q true; then
              echo "❌ Container exited before becoming healthy"
              exit 1
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "❌ ${SERVICE_IMAGE} failed to respond within ${timeout}s"
          exit 1

      - name: Verify container starts (process check)
        if: matrix.service.type == 'process'
        env:
          SERVICE_IMAGE: ${{ matrix.service.image }}
          RC_TAG: ${{ needs.prepare.outputs.full_tag }}${{ matrix.service.tag_suffix || '' }}
        run: |
          image="ghcr.io/jmservera/aithena-${SERVICE_IMAGE}:${RC_TAG}"

          docker run -d --name smoke-container "${image}"

          echo "Waiting 10s to verify ${SERVICE_IMAGE} starts without crashing..."
          sleep 10

          if docker inspect --format='{{.State.Running}}' smoke-container 2>/dev/null | grep -q true; then
            echo "✅ ${SERVICE_IMAGE} is still running after 10s"
          else
            exit_code=$(docker inspect --format='{{.State.ExitCode}}' smoke-container)
            echo "⚠️ ${SERVICE_IMAGE} exited with code ${exit_code}"
            # Queue consumers exit quickly without RabbitMQ/Redis — verify it at
            # least survived initial module loading (ran for >3s).
            started=$(docker inspect --format='{{.State.StartedAt}}' smoke-container)
            finished=$(docker inspect --format='{{.State.FinishedAt}}' smoke-container)
            runtime=$(python3 -c "
          from datetime import datetime, timezone
          fmt = '%Y-%m-%dT%H:%M:%S'
          s = '${started}'[:19]
          f = '${finished}'[:19]
          d = (datetime.strptime(f, fmt) - datetime.strptime(s, fmt)).total_seconds()
          print(d)
          ")
            echo "Container ran for ${runtime}s"
            if python3 -c "exit(0 if float('${runtime}') >= 3 else 1)"; then
              echo "✅ ${SERVICE_IMAGE} passed module-loading phase (ran ${runtime}s before exit)"
            else
              echo "❌ ${SERVICE_IMAGE} crashed immediately (${runtime}s) — likely a broken image"
              exit 1
            fi
          fi

      - name: Report result to summary
        if: always()
        env:
          SERVICE_IMAGE: ${{ matrix.service.image }}
          RC_TAG: ${{ needs.prepare.outputs.full_tag }}${{ matrix.service.tag_suffix || '' }}
          STEP_STATUS: ${{ job.status }}
        run: |
          if [ "$STEP_STATUS" = "success" ]; then
            echo "| ✅ | \`${SERVICE_IMAGE}\` | \`${RC_TAG}\` | Passed |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| ❌ | \`${SERVICE_IMAGE}\` | \`${RC_TAG}\` | Failed |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::Container logs for ${{ matrix.service.image }}"
          docker logs smoke-container 2>&1 || true
          echo "::endgroup::"

      - name: Cleanup
        if: always()
        run: docker rm -f smoke-container 2>/dev/null || true
