name: Version Check

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'VERSION'
      - '**/Dockerfile'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-check:
    name: Validate version metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Validate VERSION file
        shell: bash
        run: |
          if [[ ! -f VERSION ]]; then
            echo "VERSION file is missing." >&2
            exit 1
          fi

          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must contain a stable semver (X.Y.Z). Found: $version" >&2
            exit 1
          fi

          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Validated VERSION=$version"

      - name: Verify Dockerfiles declare VERSION build arg
        shell: bash
        run: |
          dockerfiles="$(find . -type f -name Dockerfile -print)"

          if [[ -z "$dockerfiles" ]]; then
            echo "No Dockerfiles found. Skipping VERSION build arg validation."
            exit 0
          fi

          while IFS= read -r dockerfile; do
            if [[ -z "$dockerfile" ]]; then
              continue
            fi

            if ! grep -Eq '^ARG VERSION(=.+)?$' "$dockerfile"; then
              echo "$dockerfile is missing an ARG VERSION declaration." >&2
              exit 1
            fi
          done <<< "$dockerfiles"

          echo "All Dockerfiles declare ARG VERSION."
