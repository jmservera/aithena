name: Squad Heartbeat (Ralph)

on:
  schedule:
    # Every 30 minutes — adjust or remove if not needed
    - cron: '*/30 * * * *'

  # React to completed work or new squad work
  issues:
    types: [closed, labeled]
  pull_request:
    types: [closed]

  # Manual trigger
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  pull-requests: read
  checks: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Ralph — Check for squad work
        uses: ./.github/actions/squad-heartbeat-triage
        with:
          github-token: ${{ github.token }}

      # Copilot auto-assign step (uses PAT if available)
      - name: Ralph — Assign @copilot issues
        if: success()
        uses: ./.github/actions/squad-copilot-assign
        with:
          github-token: ${{ secrets.COPILOT_ASSIGN_TOKEN || github.token }}
