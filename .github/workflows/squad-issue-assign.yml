name: Squad Issue Assign

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  assign-work:
    # Only trigger on squad:{member} labels (not the base "squad" label)
    if: startsWith(github.event.label.name, 'squad:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Assign work to squad member
        uses: ./.github/actions/squad-issue-assign
        with:
          github-token: ${{ github.token }}
          copilot-assign-token: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
