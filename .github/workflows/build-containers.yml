name: Build Containers

on:
  workflow_call:
    inputs:
      version:
        description: 'Semantic version without v prefix (e.g. 1.2.3 or 1.2.3-rc.1)'
        required: true
        type: string
      push:
        description: 'Push images to registry'
        required: false
        type: boolean
        default: true
      tags:
        description: 'Docker metadata tag patterns (multi-line, passed to docker/metadata-action)'
        required: true
        type: string
      build-date:
        description: 'Build timestamp in ISO 8601 format'
        required: true
        type: string
    secrets:
      HF_TOKEN:
        description: 'HuggingFace token for embeddings-server model download'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service.image }}${{ matrix.service.tag_suffix || '' }}
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        service:
          - image: aithena-ui
            context: ./src/aithena-ui
            dockerfile: ./src/aithena-ui/Dockerfile
          - image: document-indexer
            context: ./src/document-indexer
            dockerfile: ./src/document-indexer/Dockerfile
          - image: document-lister
            context: ./src/document-lister
            dockerfile: ./src/document-lister/Dockerfile
          - image: embeddings-server
            context: ./src/embeddings-server
            dockerfile: ./src/embeddings-server/Dockerfile
            # no_cache: GHA cache can't reliably hold the ~4 GB venv layer
            # (PyTorch + IPEX). Rebuilding guarantees a correct image. If
            # GitHub raises the cache-size limit, consider removing this flag.
            no_cache: true
          - image: embeddings-server
            context: ./src/embeddings-server
            dockerfile: ./src/embeddings-server/Dockerfile
            tag_suffix: "-openvino"
            no_cache: true  # see comment on the non-openvino entry
            extra_build_args: |
              INSTALL_OPENVINO=true
              BASE_TAG=3.12-slim-multilingual-e5-base-openvino
          - image: solr-search
            context: .
            dockerfile: ./src/solr-search/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/jmservera/aithena-${{ matrix.service.image }}
          tags: ${{ inputs.tags }}
          flavor: |
            suffix=${{ matrix.service.tag_suffix || '' }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Disable provenance attestation so output uses Docker v2 manifest
          # format, matching the base image and enabling better layer reuse.
          provenance: false
          build-args: |
            VERSION=${{ inputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ inputs.build-date }}
            ${{ matrix.service.extra_build_args || '' }}
          secrets: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: ${{ !matrix.service.no_cache && format('type=gha,scope={0}{1}', matrix.service.image, matrix.service.tag_suffix || '') || '' }}
          cache-to: ${{ !matrix.service.no_cache && format('type=gha,mode=max,scope={0}{1}', matrix.service.image, matrix.service.tag_suffix || '') || '' }}
