name: CI - Unit & Integration Tests

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  document-indexer-tests:
    name: document-indexer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: src/document-indexer/uv.lock

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: src/document-indexer
        run: uv sync --frozen

      - name: Run tests with coverage
        working-directory: src/document-indexer
        run: uv run pytest -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: document-indexer-coverage
          path: src/document-indexer/htmlcov/
          retention-days: 14

  solr-search-tests:
    name: solr-search tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: "src/solr-search/uv.lock"

      - name: Install dependencies
        working-directory: src/solr-search
        run: uv sync --frozen

      - name: Run tests with coverage
        working-directory: src/solr-search
        run: uv run pytest -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: solr-search-coverage
          path: src/solr-search/htmlcov/
          retention-days: 14

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6  # v3.6.1

  all-tests-passed:
    name: All tests passed
    runs-on: ubuntu-latest
    needs:
      - document-indexer-tests
      - solr-search-tests
      - python-lint
    steps:
      - run: echo "All tests passed successfully!"
