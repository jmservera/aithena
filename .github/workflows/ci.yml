name: CI - Unit & Integration Tests

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  document-indexer-tests:
    name: document-indexer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: src/document-indexer/uv.lock

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: src/document-indexer
        run: uv sync --frozen

      - name: Run tests
        working-directory: src/document-indexer
        run: uv run pytest -v --tb=short --cov=document_indexer --cov-report=term-missing

  solr-search-tests:
    name: solr-search tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: "src/solr-search/uv.lock"

      - name: Install dependencies
        working-directory: src/solr-search
        run: uv sync --frozen

      - name: Run unit tests
        working-directory: src/solr-search
        run: uv run pytest tests/test_search_service.py -v --tb=short --cov=search_service --cov-report=term-missing

      - name: Run integration tests
        working-directory: src/solr-search
        run: uv run pytest tests/test_integration.py -v --tb=short

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6  # v3.6.1

  all-tests-passed:
    name: All tests passed
    runs-on: ubuntu-latest
    needs:
      - document-indexer-tests
      - solr-search-tests
      - python-lint
    steps:
      - run: echo "All tests passed successfully!"
