name: CI - Unit & Integration Tests

on:
  push:
    branches:
      - main
      - jmservera/solrstreamlitui
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  document-indexer-tests:
    name: document-indexer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            document-indexer/uv.lock
            document-indexer/requirements.txt

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: document-indexer
        run: |
          if [ -f pyproject.toml ]; then
            uv sync --frozen
          else
            uv pip install --system -r requirements.txt
            uv pip install --system pytest pytest-cov
          fi

      - name: Run tests
        working-directory: document-indexer
        run: python -m pytest -v --tb=short --cov=document_indexer --cov-report=term-missing

  solr-search-tests:
    name: solr-search tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            solr-search/uv.lock
            solr-search/requirements.txt

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: solr-search
        run: |
          if [ -f pyproject.toml ]; then
            uv sync --frozen
          else
            uv pip install --system -r requirements.txt
            uv pip install --system pytest pytest-cov 'httpx<0.28'
          fi

      - name: Run unit tests
        working-directory: solr-search
        run: python -m pytest tests/test_search_service.py -v --tb=short --cov=search_service --cov-report=term-missing

      - name: Run integration tests
        working-directory: solr-search
        run: python -m pytest tests/test_integration.py -v --tb=short

  all-tests-passed:
    name: All tests passed
    runs-on: ubuntu-latest
    needs:
      - document-indexer-tests
      - solr-search-tests
    steps:
      - run: echo "All tests passed successfully!"
