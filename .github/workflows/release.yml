name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_date: ${{ steps.build_date.outputs.build_date }}
    steps:
      - name: Validate stable semver tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Expected a stable semver tag in the form vX.Y.Z, got: $tag" >&2
            exit 1
          fi

          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Verify VERSION file matches pushed tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Check VERSION-tag consistency
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if [[ ! -f VERSION ]]; then
            echo "::error::VERSION file not found in repository root"
            exit 1
          fi

          file_version="$(tr -d '[:space:]' < VERSION)"

          if [[ "$file_version" != "$TAG_VERSION" ]]; then
            echo "::error::VERSION file ($file_version) does not match pushed tag v${TAG_VERSION}"
            echo "::error::Update the VERSION file before tagging, or use scripts/create-release-tag.sh"
            exit 1
          fi

          echo "✅ VERSION file ($file_version) matches tag v${TAG_VERSION}"

      - name: Validate tag exists on main branch
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          TAG_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          echo "Validating that tag $TAG_NAME ($TAG_SHA) is on the main branch..."

          # Use GitHub API to check if main branch contains the tagged commit
          compare_json=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/compare/main...$TAG_SHA" 2>/dev/null) || {
            echo "::error::Failed to query GitHub API. Cannot verify tag branch."
            exit 1
          }

          # "behind" or "identical" means the tag commit is reachable from main
          ahead_by=$(echo "$compare_json" | python3 -c "import sys,json; print(json.load(sys.stdin)['ahead_by'])")

          if [ "$ahead_by" != "0" ]; then
            echo "::error::Tag $TAG_NAME points to a commit that is $ahead_by commit(s) ahead of main."
            echo "::error::Release tags must only be created on the main branch."
            echo "::error::Pipeline: dev → main (PR with integration tests) → tag on main → release"
            exit 1
          fi

          echo "✅ Tag $TAG_NAME is on the main branch (commit is reachable from main HEAD)"

      - name: Capture build timestamp
        id: build_date
        shell: bash
        run: echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and push containers
    needs: validate-tag
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-containers.yml
    with:
      version: ${{ needs.validate-tag.outputs.version }}
      push: true
      tags: |
        type=semver,pattern={{version}},value=v${{ needs.validate-tag.outputs.version }}
        type=semver,pattern={{major}}.{{minor}},value=v${{ needs.validate-tag.outputs.version }}
        type=semver,pattern={{major}},value=v${{ needs.validate-tag.outputs.version }}
        type=raw,value=latest
      build-date: ${{ needs.validate-tag.outputs.build_date }}
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

  smoke-test:
    name: Smoke test ${{ matrix.service.image }}${{ matrix.service.tag_suffix || '' }}
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-and-push
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - image: solr-search
            type: http
            port: "8080"
            health_endpoint: /health
            startup_timeout: 30
          - image: embeddings-server
            type: http
            port: "8080"
            health_endpoint: /health
            startup_timeout: 60
          - image: embeddings-server
            type: http
            port: "8080"
            health_endpoint: /health
            startup_timeout: 60
            tag_suffix: "-openvino"
            docker_env: "-e BACKEND=openvino -e DEVICE=cpu"
          - image: aithena-ui
            type: http
            port: "8080"
            health_endpoint: /health
            startup_timeout: 15
          - image: document-lister
            type: process
          - image: document-indexer
            type: process
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          SERVICE_IMAGE: ${{ matrix.service.image }}
          VERSION: ${{ needs.validate-tag.outputs.version }}${{ matrix.service.tag_suffix || '' }}
        run: docker pull "ghcr.io/jmservera/aithena-${SERVICE_IMAGE}:${VERSION}"

      - name: Start container and check health endpoint
        if: matrix.service.type == 'http'
        env:
          SERVICE_IMAGE: ${{ matrix.service.image }}
          VERSION: ${{ needs.validate-tag.outputs.version }}${{ matrix.service.tag_suffix || '' }}
          SERVICE_PORT: ${{ matrix.service.port }}
          HEALTH_ENDPOINT: ${{ matrix.service.health_endpoint }}
          STARTUP_TIMEOUT: ${{ matrix.service.startup_timeout }}
          DOCKER_ENV: ${{ matrix.service.docker_env || '' }}
        run: |
          image="ghcr.io/jmservera/aithena-${SERVICE_IMAGE}:${VERSION}"
          port="${SERVICE_PORT}"
          endpoint="${HEALTH_ENDPOINT}"
          timeout="${STARTUP_TIMEOUT}"

          docker run -d --name smoke-container -p "${port}:${port}" ${DOCKER_ENV} "${image}"

          elapsed=0
          echo "Waiting up to ${timeout}s for ${SERVICE_IMAGE} at :${port}${endpoint}..."
          while [ "$elapsed" -lt "$timeout" ]; do
            if curl -sf "http://localhost:${port}${endpoint}" > /dev/null 2>&1; then
              echo "✅ ${SERVICE_IMAGE} is healthy after ${elapsed}s"
              exit 0
            fi
            # Fail fast if the container exited
            if ! docker inspect --format='{{.State.Running}}' smoke-container 2>/dev/null | grep -q true; then
              echo "❌ Container exited before becoming healthy"
              exit 1
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "❌ ${SERVICE_IMAGE} failed to respond within ${timeout}s"
          exit 1

      - name: Verify container starts (process check)
        if: matrix.service.type == 'process'
        env:
          SERVICE_IMAGE: ${{ matrix.service.image }}
          VERSION: ${{ needs.validate-tag.outputs.version }}${{ matrix.service.tag_suffix || '' }}
        run: |
          image="ghcr.io/jmservera/aithena-${SERVICE_IMAGE}:${VERSION}"

          docker run -d --name smoke-container "${image}"

          echo "Waiting 10s to verify ${SERVICE_IMAGE} starts without crashing..."
          sleep 10

          if docker inspect --format='{{.State.Running}}' smoke-container 2>/dev/null | grep -q true; then
            echo "✅ ${SERVICE_IMAGE} is still running after 10s"
          else
            exit_code=$(docker inspect --format='{{.State.ExitCode}}' smoke-container)
            echo "⚠️ ${SERVICE_IMAGE} exited with code ${exit_code}"
            # Queue consumers exit quickly without RabbitMQ/Redis — verify it at
            # least survived initial module loading (ran for >3s).
            started=$(docker inspect --format='{{.State.StartedAt}}' smoke-container)
            finished=$(docker inspect --format='{{.State.FinishedAt}}' smoke-container)
            runtime=$(python3 -c "
          from datetime import datetime, timezone
          fmt = '%Y-%m-%dT%H:%M:%S'
          s = '${started}'[:19]
          f = '${finished}'[:19]
          d = (datetime.strptime(f, fmt) - datetime.strptime(s, fmt)).total_seconds()
          print(d)
          ")
            echo "Container ran for ${runtime}s"
            if python3 -c "exit(0 if float('${runtime}') >= 3 else 1)"; then
              echo "✅ ${SERVICE_IMAGE} passed module-loading phase (ran ${runtime}s before exit)"
            else
              echo "❌ ${SERVICE_IMAGE} crashed immediately (${runtime}s) — likely a broken image"
              exit 1
            fi
          fi

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::Container logs for ${{ matrix.service.image }}"
          docker logs smoke-container 2>&1 || true
          echo "::endgroup::"

      - name: Cleanup
        if: always()
        run: docker rm -f smoke-container 2>/dev/null || true

  package-release:
    name: Package release artifacts
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-and-push
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Create release package
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          mkdir -p release-package/installer
          
          # Core production files
          cp docker/compose.prod.yml release-package/
          cp .env.prod.example release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cp VERSION release-package/
          
          # Installer scripts
          cp -r installer/* release-package/installer/
          
          # Documentation
          mkdir -p release-package/docs
          cp docs/quickstart.md release-package/docs/
          cp docs/user-manual.md release-package/docs/
          cp docs/admin-manual.md release-package/docs/
          
          # Required configuration files for nginx, solr, and rabbitmq
          mkdir -p release-package/src/nginx
          mkdir -p release-package/src/solr
          mkdir -p release-package/src/rabbitmq
          cp -r src/nginx/* release-package/src/nginx/
          cp -r src/solr/books release-package/src/solr/
          cp src/solr/add-conf-overlay.sh release-package/src/solr/
          cp src/rabbitmq/rabbitmq.conf release-package/src/rabbitmq/
          
          # Create tarball
          tar -czf "aithena-v${VERSION}-release.tar.gz" -C release-package .
          
          # Generate checksum
          sha256sum "aithena-v${VERSION}-release.tar.gz" > "aithena-v${VERSION}-release.tar.gz.sha256"

      - name: Upload release package as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-package
          path: |
            aithena-v${{ needs.validate-tag.outputs.version }}-release.tar.gz
            aithena-v${{ needs.validate-tag.outputs.version }}-release.tar.gz.sha256
          retention-days: 90

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-and-push
      - package-release
      - smoke-test
    # Smoke tests are advisory — a failure warns but does not block the release.
    # Images are already pushed by build-and-push; the release should proceed as
    # long as validation, build, and packaging all succeeded.
    if: >-
      always()
      && needs.validate-tag.result == 'success'
      && needs.build-and-push.result == 'success'
      && needs.package-release.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Download release package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-package
          path: .

      - name: Extract release notes from CHANGELOG.md
        id: release_notes
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        shell: bash
        run: |
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [X.Y.Z]" until the next "## [" heading or end of file
          notes=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md)

          if [[ -z "$notes" ]]; then
            echo "::warning::No CHANGELOG.md entry found for ${VERSION}, falling back to auto-generated notes"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            # Write to a temp file to avoid shell quoting issues
            echo "$notes" > "$RUNNER_TEMP/release-notes.md"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Add smoke test warning if tests did not all pass
        if: needs.smoke-test.result != 'success'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
          NOTES_FOUND: ${{ steps.release_notes.outputs.found }}
        shell: bash
        run: |
          warning="⚠️ **Smoke tests did not pass (${SMOKE_RESULT}).** Container images were published successfully but post-push health checks did not all pass. Review the [workflow run](${RUN_URL}) for details before deploying to production."

          if [[ "$NOTES_FOUND" == "true" ]]; then
            printf '%s\n\n---\n\n' "$warning" | cat - "$RUNNER_TEMP/release-notes.md" > "$RUNNER_TEMP/release-notes-final.md"
            mv "$RUNNER_TEMP/release-notes-final.md" "$RUNNER_TEMP/release-notes.md"
          else
            echo "$warning" > "$RUNNER_TEMP/smoke-warning.md"
          fi

      - name: Create GitHub release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.validate-tag.outputs.version }}
          NOTES_FOUND: ${{ steps.release_notes.outputs.found }}
          SMOKE_PASSED: ${{ needs.smoke-test.result == 'success' }}
        run: |
          release_args=("$TAG_NAME" --verify-tag)

          if [[ "$NOTES_FOUND" == "true" ]]; then
            release_args+=(--notes-file "$RUNNER_TEMP/release-notes.md")
          elif [[ "$SMOKE_PASSED" != "true" && -f "$RUNNER_TEMP/smoke-warning.md" ]]; then
            release_args+=(--notes-file "$RUNNER_TEMP/smoke-warning.md")
          else
            release_args+=(--generate-notes)
          fi

          gh release create "${release_args[@]}" \
            "aithena-v${VERSION}-release.tar.gz#Production Release Package" \
            "aithena-v${VERSION}-release.tar.gz.sha256#SHA256 Checksum"
