name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_date: ${{ steps.build_date.outputs.build_date }}
    steps:
      - name: Validate stable semver tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Expected a stable semver tag in the form vX.Y.Z, got: $tag" >&2
            exit 1
          fi

          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Validate tag exists on main branch
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          TAG_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          echo "Validating that tag $TAG_NAME ($TAG_SHA) is on the main branch..."

          # Use GitHub API to check if main branch contains the tagged commit
          compare_json=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/compare/main...$TAG_SHA" 2>/dev/null) || {
            echo "::error::Failed to query GitHub API. Cannot verify tag branch."
            exit 1
          }

          # "behind" or "identical" means the tag commit is reachable from main
          ahead_by=$(echo "$compare_json" | python3 -c "import sys,json; print(json.load(sys.stdin)['ahead_by'])")

          if [ "$ahead_by" != "0" ]; then
            echo "::error::Tag $TAG_NAME points to a commit that is $ahead_by commit(s) ahead of main."
            echo "::error::Release tags must only be created on the main branch."
            echo "::error::Pipeline: dev → main (PR with integration tests) → tag on main → release"
            exit 1
          fi

          echo "✅ Tag $TAG_NAME is on the main branch (commit is reachable from main HEAD)"

      - name: Capture build timestamp
        id: build_date
        shell: bash
        run: echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and push ${{ matrix.service.image }}
    runs-on: ubuntu-latest
    needs: validate-tag
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - image: admin
            context: .
            dockerfile: ./src/admin/Dockerfile
          - image: aithena-ui
            context: ./src/aithena-ui
            dockerfile: ./src/aithena-ui/Dockerfile
          - image: document-indexer
            context: ./src/document-indexer
            dockerfile: ./src/document-indexer/Dockerfile
          - image: document-lister
            context: ./src/document-lister
            dockerfile: ./src/document-lister/Dockerfile
          - image: embeddings-server
            context: ./src/embeddings-server
            dockerfile: ./src/embeddings-server/Dockerfile
          - image: solr-search
            context: .
            dockerfile: ./src/solr-search/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/jmservera/aithena-${{ matrix.service.image }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.validate-tag.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.validate-tag.outputs.version }}
            type=semver,pattern={{major}},value=v${{ needs.validate-tag.outputs.version }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.validate-tag.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ needs.validate-tag.outputs.build_date }}
          cache-from: type=gha,scope=${{ matrix.service.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.image }}

  package-release:
    name: Package release artifacts
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-and-push
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Create release package
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          mkdir -p release-package/installer
          
          # Core production files
          cp docker-compose.prod.yml release-package/
          cp .env.prod.example release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cp VERSION release-package/
          
          # Installer scripts
          cp -r installer/* release-package/installer/
          
          # Documentation
          mkdir -p release-package/docs
          cp docs/quickstart.md release-package/docs/
          cp docs/user-manual.md release-package/docs/
          cp docs/admin-manual.md release-package/docs/
          
          # Required configuration files for nginx, solr, and rabbitmq
          mkdir -p release-package/src/nginx
          mkdir -p release-package/src/solr
          mkdir -p release-package/src/rabbitmq
          cp -r src/nginx/* release-package/src/nginx/
          cp -r src/solr/books release-package/src/solr/
          cp src/solr/add-conf-overlay.sh release-package/src/solr/
          cp src/rabbitmq/rabbitmq.conf release-package/src/rabbitmq/
          
          # Create tarball
          tar -czf "aithena-v${VERSION}-release.tar.gz" -C release-package .
          
          # Generate checksum
          sha256sum "aithena-v${VERSION}-release.tar.gz" > "aithena-v${VERSION}-release.tar.gz.sha256"

      - name: Upload release package as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: release-package
          path: |
            aithena-v${{ needs.validate-tag.outputs.version }}-release.tar.gz
            aithena-v${{ needs.validate-tag.outputs.version }}-release.tar.gz.sha256
          retention-days: 90

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-and-push
      - package-release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Download release package
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: release-package
          path: .

      - name: Create GitHub release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          gh release create "$TAG_NAME" \
            --generate-notes \
            --verify-tag \
            "aithena-v${VERSION}-release.tar.gz#Production Release Package" \
            "aithena-v${VERSION}-release.tar.gz.sha256#SHA256 Checksum"
