name: Security - Bandit Python SAST

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

# Required for SARIF upload to Code Scanning
permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit-scan:
    name: Bandit Python security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[sarif]

      - name: Run Bandit scan
        run: |
          # Run bandit with configuration from .bandit file
          # -r: recursive scan
          # -f sarif: output SARIF format for GitHub Code Scanning
          # -o: output file
          # Exits non-zero on findings — this is intentional so security
          # issues block merges (required status check)
          bandit -c .bandit -r . -f sarif -o bandit-results.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: bandit-sarif
          path: bandit-results.sarif
          retention-days: 30
