name: Security - Bandit Python SAST

on:
  push:
    branches:
      - dev
      - main
    paths:
      - '**/*.py'
      - '.bandit'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - '**/*.py'
      - '.bandit'

# Required for SARIF upload to Code Scanning
permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit-scan:
    name: Bandit Python security scan
    runs-on: ubuntu-latest
    # Non-blocking: allow workflow to succeed even if vulnerabilities found
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[sarif]

      - name: Run Bandit scan
        run: |
          # Run bandit with configuration from .bandit file
          # -r: recursive scan
          # -f sarif: output SARIF format for GitHub Code Scanning
          # -o: output file
          # --exit-zero: don't fail on findings (handled by continue-on-error)
          bandit -c .bandit -r . -f sarif -o bandit-results.sarif --exit-zero || true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@820e3160e279568db735cee8ed8f8e77a6da7818  # v3.32.6
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: bandit-sarif
          path: bandit-results.sarif
          retention-days: 30
