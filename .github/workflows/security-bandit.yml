name: Security - Bandit Python SAST

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

# Required for SARIF upload to Code Scanning
permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit-scan:
    name: Bandit Python security scan
    runs-on: ubuntu-latest
    # Non-blocking: allow workflow to succeed even if vulnerabilities found
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[sarif]

      - name: Run Bandit scan
        run: |
          # Run bandit with configuration from .bandit file
          # -r: recursive scan
          # -f sarif: output SARIF format for GitHub Code Scanning
          # -o: output file
          # --exit-zero: don't fail on findings (handled by continue-on-error)
          bandit -c .bandit -r . -f sarif -o bandit-results.sarif --exit-zero || true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-sarif
          path: bandit-results.sarif
          retention-days: 30
