name: Squad Heartbeat Triage
description: >
  Ralph's heartbeat check — find untriaged issues, unstarted work,
  Dependabot PRs needing attention, and auto-triage by keyword routing.

inputs:
  github-token:
    description: GitHub token for API calls
    required: true

runs:
  using: composite
  steps:
    - name: Ralph — Check for squad work
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');

          // Read team roster — check .squad/ first, fall back to .ai-team/
          let teamFile = '.squad/team.md';
          if (!fs.existsSync(teamFile)) {
            teamFile = '.ai-team/team.md';
          }
          if (!fs.existsSync(teamFile)) {
            core.info('No .squad/team.md or .ai-team/team.md found — Ralph has nothing to monitor');
            return;
          }

          const content = fs.readFileSync(teamFile, 'utf8');

          // Check if Ralph is on the roster
          if (!content.includes('Ralph') || !content.includes('🔄')) {
            core.info('Ralph not on roster — heartbeat disabled');
            return;
          }

          // Parse members from roster
          const lines = content.split('\n');
          const members = [];
          let inMembersTable = false;
          for (const line of lines) {
            if (line.match(/^##\s+Members/i)) {
              inMembersTable = true;
              continue;
            }
            if (inMembersTable && line.startsWith('## ')) break;
            if (inMembersTable && line.startsWith('|') && !line.includes('---') && !line.includes('Name')) {
              const cells = line.split('|').map(c => c.trim()).filter(Boolean);
              if (cells.length >= 2 && !['Scribe', 'Ralph'].includes(cells[0])) {
                members.push({
                  name: cells[0],
                  role: cells[1],
                  label: `squad:${cells[0].toLowerCase()}`
                });
              }
            }
          }

          if (members.length === 0) {
            core.info('No squad members found — nothing to monitor');
            return;
          }

          // 1. Find untriaged issues (labeled "squad" but no "squad:{member}" label)
          const { data: squadIssues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: 'squad',
            state: 'open',
            per_page: 20
          });

          const memberLabels = members.map(m => m.label);
          const untriaged = squadIssues.filter(issue => {
            const issueLabels = issue.labels.map(l => l.name);
            return !memberLabels.some(ml => issueLabels.includes(ml));
          });

          // 2. Fix orphaned squad:* labels (ensure parent 'squad' label is present)
          for (const member of members) {
            try {
              const { data: memberIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: member.label,
                state: 'open',
                per_page: 10
              });
              for (const issue of memberIssues) {
                const hasSquadLabel = issue.labels.some(l => l.name === 'squad');
                if (!hasSquadLabel) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: ['squad']
                  });
                  core.info(`Fixed orphaned label: added 'squad' to #${issue.number}`);
                }
              }
            } catch (e) {
              // Label may not exist yet
            }
          }

          // 3. Find squad issues missing triage verdict (no go:* label)
          const missingVerdict = squadIssues.filter(issue => {
            const labels = issue.labels.map(l => l.name);
            return !labels.some(l => l.startsWith('go:'));
          });

          // 4. Find go:yes issues missing release target
          const goYesIssues = squadIssues.filter(issue => {
            const labels = issue.labels.map(l => l.name);
            return labels.includes('go:yes') && !labels.some(l => l.startsWith('release:'));
          });

          // 4b. Find issues missing type: label
          const missingType = squadIssues.filter(issue => {
            const labels = issue.labels.map(l => l.name);
            return !labels.some(l => l.startsWith('type:'));
          });

          // 5. Find open PRs that need attention
          const { data: openPRs } = await github.rest.pulls.list({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            per_page: 20
          });

          const squadPRs = openPRs.filter(pr =>
            pr.labels.some(l => l.name.startsWith('squad'))
          );

          // 6. Detect Dependabot PRs needing manual attention
          const dependabotPRs = openPRs.filter(pr =>
            pr.user.login === 'dependabot[bot]' &&
            !pr.labels.some(l => l.name.startsWith('squad:'))
          );

          const dependabotNeedsAttention = [];
          const STALE_DAYS = 7;

          for (const pr of dependabotPRs) {
            const labels = pr.labels.map(l => l.name);
            let reason = '';

            if (labels.includes('dependabot:manual-review')) {
              reason = 'Major version update flagged for manual review';
            }

            if (!reason) {
              try {
                const { data: checks } = await github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: pr.head.sha,
                  per_page: 50
                });
                const failed = checks.check_runs.filter(c =>
                  c.conclusion === 'failure' || c.conclusion === 'cancelled'
                );
                if (failed.length > 0) {
                  reason = `CI failed: ${failed.map(c => c.name).join(', ')}`;
                }
              } catch (e) {
                core.info(`Could not fetch checks for PR #${pr.number}: ${e.message}`);
              }
            }

            if (!reason) {
              const updatedAt = new Date(pr.updated_at);
              const daysSinceUpdate = (Date.now() - updatedAt.getTime()) / (1000 * 60 * 60 * 24);
              if (daysSinceUpdate > STALE_DAYS) {
                reason = `Stale: no activity for ${Math.floor(daysSinceUpdate)} days`;
              }
            }

            if (reason) {
              dependabotNeedsAttention.push({ pr, reason });
            }
          }

          // Build status summary
          const summary = [];
          if (untriaged.length > 0) {
            summary.push(`🔴 **${untriaged.length} untriaged issue(s)** need triage`);
          }
          if (missingVerdict.length > 0) {
            summary.push(`⚪ **${missingVerdict.length} issue(s)** missing triage verdict (no \`go:\` label)`);
          }
          if (goYesIssues.length > 0) {
            summary.push(`⚪ **${goYesIssues.length} approved issue(s)** missing release target (no \`release:\` label)`);
          }
          if (missingType.length > 0) {
            summary.push(`⚪ **${missingType.length} issue(s)** missing \`type:\` label`);
          }
          if (squadPRs.length > 0) {
            const drafts = squadPRs.filter(pr => pr.draft).length;
            const ready = squadPRs.length - drafts;
            if (drafts > 0) summary.push(`🟡 **${drafts} draft PR(s)** in progress`);
            if (ready > 0) summary.push(`🟢 **${ready} PR(s)** open for review/merge`);
          }
          if (dependabotNeedsAttention.length > 0) {
            summary.push(`🤖 **${dependabotNeedsAttention.length} Dependabot PR(s)** need manual attention`);
          }

          if (summary.length === 0) {
            core.info('📋 Board is clear — Ralph found no pending work');
            return;
          }

          core.info(`🔄 Ralph found work:\n${summary.join('\n')}`);

          // Auto-triage untriaged issues
          for (const issue of untriaged) {
            const issueText = `${issue.title}\n${issue.body || ''}`.toLowerCase();
            let assignedMember = null;
            let reason = '';

            for (const member of members) {
              const role = member.role.toLowerCase();
              if ((role.includes('frontend') || role.includes('ui')) &&
                  (issueText.includes('ui') || issueText.includes('frontend') ||
                   issueText.includes('css') || issueText.includes('component'))) {
                assignedMember = member;
                reason = 'Matches frontend/UI domain';
                break;
              }
              if ((role.includes('backend') || role.includes('api') || role.includes('server')) &&
                  (issueText.includes('api') || issueText.includes('backend') ||
                   issueText.includes('database') || issueText.includes('endpoint'))) {
                assignedMember = member;
                reason = 'Matches backend/API domain';
                break;
              }
              if ((role.includes('test') || role.includes('qa')) &&
                  (issueText.includes('test') || issueText.includes('bug') ||
                   issueText.includes('fix') || issueText.includes('regression'))) {
                assignedMember = member;
                reason = 'Matches testing/QA domain';
                break;
              }
            }

            if (!assignedMember) {
              const lead = members.find(m =>
                m.role.toLowerCase().includes('lead') ||
                m.role.toLowerCase().includes('architect')
              );
              if (lead) {
                assignedMember = lead;
                reason = 'No domain match — routed to Lead';
              }
            }

            if (assignedMember) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [assignedMember.label]
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  `### 🔄 Ralph — Auto-Triage`,
                  '',
                  `**Assigned to:** ${assignedMember.name} (${assignedMember.role})`,
                  `**Reason:** ${reason}`,
                  '',
                  `> Ralph auto-triaged this issue via the squad heartbeat. To reassign, swap the \`squad:*\` label.`
                ].join('\n')
              });

              core.info(`Auto-triaged #${issue.number} → ${assignedMember.name}`);
            }
          }

          // Auto-triage Dependabot PRs by dependency domain
          const depRouting = [
            { member: 'kane', deps: ['python-jose', 'cryptography', 'ecdsa', 'pyjwt', 'bcrypt', 'passlib', 'jwt'] },
            { member: 'brett', deps: [], paths: ['.github/workflows/', 'Dockerfile', 'docker-compose', 'actions/'] },
            { member: 'parker', deps: [], paths: ['requirements.txt', 'pyproject.toml', 'uv.lock'] },
            { member: 'dallas', deps: [], paths: ['package.json', 'package-lock.json'] },
            { member: 'lambert', deps: ['pytest', 'vitest', 'jest', 'testing-library'], ciFailure: true }
          ];

          for (const { pr, reason } of dependabotNeedsAttention) {
            const title = pr.title.toLowerCase();
            const branch = (pr.head.ref || '').toLowerCase();
            let routeTo = null;
            let routeReason = '';

            if (reason.startsWith('CI failed')) {
              const rule = depRouting.find(r => r.ciFailure);
              if (rule) {
                routeTo = rule.member;
                routeReason = 'CI failure detected — routing to test/QA specialist';
              }
            }

            if (!routeTo) {
              for (const rule of depRouting) {
                if (rule.deps && rule.deps.some(d => title.includes(d) || branch.includes(d))) {
                  routeTo = rule.member;
                  routeReason = `Dependency matches ${rule.member}'s domain`;
                  break;
                }
              }
            }

            if (!routeTo) {
              try {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 10
                });
                const filePaths = files.map(f => f.filename);
                for (const rule of depRouting) {
                  if (rule.paths && rule.paths.some(p => filePaths.some(f => f.includes(p)))) {
                    routeTo = rule.member;
                    routeReason = `Changed files match ${rule.member}'s domain`;
                    break;
                  }
                }
              } catch (e) {
                core.info(`Could not fetch files for PR #${pr.number}: ${e.message}`);
              }
            }

            if (!routeTo) {
              routeTo = 'brett';
              routeReason = 'Unclassified Dependabot PR — routed to Infrastructure';
            }

            const label = `squad:${routeTo}`;
            const memberInfo = members.find(m => m.label === label);

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [label]
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  `### 🔄 Ralph — Dependabot Triage`,
                  '',
                  `**Routed to:** ${memberInfo ? `${memberInfo.name} (${memberInfo.role})` : routeTo}`,
                  `**Detection:** ${reason}`,
                  `**Routing reason:** ${routeReason}`,
                  '',
                  `> Ralph detected this Dependabot PR needs manual attention via the squad heartbeat. To reassign, swap the \`squad:*\` label.`
                ].join('\n')
              });

              core.info(`Triaged Dependabot PR #${pr.number} → ${routeTo} (${reason})`);
            } catch (e) {
              core.warning(`Failed to triage Dependabot PR #${pr.number}: ${e.message}`);
            }
          }
