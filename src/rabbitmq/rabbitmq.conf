management.path_prefix = /admin/rabbitmq
vm_memory_high_watermark.relative = 0.6
consumer_timeout = 3600000000

# --- Expected RabbitMQ topology (declared dynamically by application code) ---
#
# Exchange:
#   name: documents       type: fanout       durable: true
#
# Queues:
#   shortembeddings       — consumed by document-indexer (distiluse → books collection)
#   shortembeddings_e5base — consumed by document-indexer-e5 (e5-base → books_e5base collection)
#
# Bindings:
#   exchange=documents → queue=shortembeddings
#   exchange=documents → queue=shortembeddings_e5base
#
# document-lister publishes to exchange="documents" (fanout).
# Each indexer declares its own queue and binds to the fanout exchange on startup.
