# Aithena Redis Security Configuration
# ======================================
# Password authentication is set via command-line --requirepass flag
# (supports environment variable substitution at container start).
# This file handles security hardening directives that require redis.conf.
#
# Mount path: /usr/local/etc/redis/redis.conf
# Usage:  redis-server /usr/local/etc/redis/redis.conf --requirepass "$REDIS_PASSWORD"
#
# IMPORTANT — Production deployments MUST override REDIS_PASSWORD with a
# strong, randomly generated secret (≥ 32 characters).  The default value
# in docker-compose.yml is for local development only.

# ── Persistence ──────────────────────────────────────────────────────────────
save 20 1

# ── Logging ──────────────────────────────────────────────────────────────────
loglevel warning

# ── Memory Policy ────────────────────────────────────────────────────────────
# Evict least-recently-used keys when the container memory limit is reached.
maxmemory-policy allkeys-lru

# ── Dangerous Command Restrictions ───────────────────────────────────────────
# Rename dangerous commands to the empty string, making them completely
# unavailable to ALL clients.  This mitigates:
#   • Data destruction  (FLUSHDB, FLUSHALL)
#   • Runtime reconfig  (CONFIG — prevents CONFIG SET / CONFIG GET)
#   • Memory inspection / crash trigger  (DEBUG)
#   • Full-keyspace scan DoS  (KEYS — use SCAN instead)
#
# NOTE: Docker graceful shutdown still works — Docker sends SIGTERM to PID 1,
# which Redis handles natively.  The SHUTDOWN *command* (client-initiated) is
# what we disable here.
#
# If you need admin access, exec into the container:
#   docker exec -it <redis-container> redis-cli
# and use the renamed commands (or restart with a temporary config).

rename-command FLUSHDB   ""
rename-command FLUSHALL  ""
rename-command CONFIG    ""
rename-command DEBUG     ""
rename-command SHUTDOWN  ""
rename-command KEYS      ""
