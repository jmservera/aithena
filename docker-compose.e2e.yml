# docker-compose.e2e.yml
#
# Docker Compose override for the E2E test suite.
#
# Usage:
#   export E2E_LIBRARY_PATH=/tmp/aithena-e2e-library
#   mkdir -p "$E2E_LIBRARY_PATH"
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d
#   cd e2e && pip install -r requirements.txt && pytest
#
# What this override changes vs. the production compose file:
#   - document-data volume points to E2E_LIBRARY_PATH (default /tmp/aithena-e2e-library)
#     instead of /home/jmservera/booklibrary, isolating the test run from the
#     real book corpus.
#   - document-lister polls every 10 seconds (POLL_INTERVAL=10) instead of the default 60 s,
#     so new files are discovered quickly during tests.
#   - solr-search rate limiting is disabled (RATE_LIMIT_REQUESTS_PER_MINUTE=0) to prevent
#     Playwright browser tests from hitting 429 errors during rapid E2E test execution.
#   - nginx is disabled to reduce resource usage in dev/CI.
#   - certbot is not in the base compose (see docker-compose.ssl.yml).

services:
  document-lister:
    environment:
      - POLL_INTERVAL=10

  solr-search:
    environment:
      - RATE_LIMIT_REQUESTS_PER_MINUTE=0

  # Disable nginx — not needed for local E2E testing
  nginx:
    profiles:
      - production

volumes:
  document-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "${E2E_LIBRARY_PATH:-/tmp/aithena-e2e-library}"
