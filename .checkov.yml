# Checkov IaC Security Scanning Configuration
# Part of SEC-2: Add checkov IaC scanning to CI (issue #89)
#
# This configuration defines skip rules for known exceptions
# where security checks are managed via alternative mechanisms.

# Skip specific checks with documented justifications
skip-check:
  # CKV_DOCKER_2: HEALTHCHECK instruction missing
  # Reason: Health checks are managed centrally in docker-compose.yml
  # instead of individual Dockerfiles. This provides better orchestration
  # control and allows environment-specific health check configurations.
  - CKV_DOCKER_2

  # CKV_DOCKER_3: USER instruction missing (container runs as root)
  # Reason: Official base images (python:3.11-slim, node:20-alpine, solr:9)
  # either run as non-root by default or require root privileges for
  # package installation during build. Application processes run with
  # appropriate permissions via docker-compose user directives or
  # base image defaults.
  - CKV_DOCKER_3

# Scan configuration
framework:
  - dockerfile
  - github_actions

# Output settings
quiet: false
compact: false
