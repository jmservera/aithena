# Disable all Solr/SolrCloud/ZooKeeper authentication and security for dev/benchmark environments
# This removes SASL, ZK ACLs, and Solr security manager — use ONLY in local dev/benchmark.
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.nosasl.yml up -d
services:
  zoo1:
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["zkServer.sh", "start-foreground"]
    environment:
      ZOO_CFG_EXTRA: "admin.enableServer=false"
      SERVER_JVMFLAGS: ""
  zoo2:
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["zkServer.sh", "start-foreground"]
    environment:
      ZOO_CFG_EXTRA: "admin.enableServer=false"
      SERVER_JVMFLAGS: ""
  zoo3:
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["zkServer.sh", "start-foreground"]
    environment:
      ZOO_CFG_EXTRA: "admin.enableServer=false"
      SERVER_JVMFLAGS: ""
  solr:
    entrypoint: ["docker-entrypoint.sh"]
    command: ["solr-foreground"]
    environment:
      SOLR_OPTS: ""
      SOLR_ZK_CREDS_AND_ACLS: ""
      SOLR_SECURITY_MANAGER_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system || exit 1"]
  solr2:
    entrypoint: ["docker-entrypoint.sh"]
    command: ["solr-foreground"]
    environment:
      SOLR_OPTS: ""
      SOLR_ZK_CREDS_AND_ACLS: ""
      SOLR_SECURITY_MANAGER_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system || exit 1"]
  solr3:
    entrypoint: ["docker-entrypoint.sh"]
    command: ["solr-foreground"]
    environment:
      SOLR_OPTS: ""
      SOLR_ZK_CREDS_AND_ACLS: ""
      SOLR_SECURITY_MANAGER_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system || exit 1"]
  solr-init:
    environment:
      SOLR_OPTS: ""
      SOLR_SECURITY_MANAGER_ENABLED: "false"
      SOLR_ZK_CREDS_AND_ACLS: ""
    entrypoint:
      - /bin/bash
      - -ce
      - |
          set -o pipefail

          ZK_HOST="zoo1:2181,zoo2:2181,zoo3:2181"
          SOLR_URL="http://solr:8983"

          until curl -fsS "$$SOLR_URL/solr/admin/info/system" >/dev/null 2>&1; do
            sleep 2
          done

          until [ "$$(curl -fsS "$$SOLR_URL/solr/admin/collections?action=CLUSTERSTATUS&wt=json" | grep -o '"[^"]*:8983_solr"' | sort -u | wc -l | tr -d '[:space:]')" -ge 3 ]; do
            sleep 2
          done

          echo "Solr cluster ready with 3 nodes (no-auth mode)"

          # --- books collection (distiluse, 512D) ---
          if ! solr zk ls /configs -z "$$ZK_HOST" | grep -qx 'books'; then
            solr zk upconfig -z "$$ZK_HOST" -n books -d /configsets/books
          fi

          if ! curl -fsS "$$SOLR_URL/solr/admin/collections?action=LIST&wt=json" | grep -q '"books"'; then
            curl -fsS "$$SOLR_URL/solr/admin/collections?action=CREATE&name=books&collection.configName=books&numShards=1&replicationFactor=3&waitForFinalState=true&wt=json"
          fi

          SOLR_BASE_URL="$$SOLR_URL" SOLR_COLLECTION="books" sh /scripts/add-conf-overlay.sh

          # --- books_e5base collection (multilingual-e5-base, 768D) ---
          if ! solr zk ls /configs -z "$$ZK_HOST" | grep -q 'books_e5base'; then
            solr zk upconfig -z "$$ZK_HOST" -n books_e5base -d /configsets/books_e5base
          fi

          if ! curl -fsS "$$SOLR_URL/solr/admin/collections?action=LIST&wt=json" | grep -q '"books_e5base"'; then
            curl -fsS "$$SOLR_URL/solr/admin/collections?action=CREATE&name=books_e5base&collection.configName=books_e5base&numShards=1&replicationFactor=3&waitForFinalState=true&wt=json"
          fi

          SOLR_BASE_URL="$$SOLR_URL" SOLR_COLLECTION="books_e5base" sh /scripts/add-conf-overlay.sh

          echo "Solr init complete (no-auth mode)"
  solr-search:
    environment:
      SOLR_AUTH_USER: ""
      SOLR_AUTH_PASS: ""
      AUTH_DEFAULT_ADMIN_PASSWORD: "${AUTH_DEFAULT_ADMIN_PASSWORD:-}"
      ALLOWED_COLLECTIONS: "books,books_e5base"
      EMBEDDINGS_URL_BOOKS_E5BASE: "http://embeddings-server-e5:8080/v1/embeddings/"
  document-indexer:
    environment:
      SOLR_AUTH_USER: ""
      SOLR_AUTH_PASS: ""
  document-indexer-e5:
    environment:
      SOLR_AUTH_USER: ""
      SOLR_AUTH_PASS: ""
