rules:
  bot-conditions:
    ignore:
      # Kane-approved baseline exception: github.actor == 'dependabot[bot]' is
      # acceptable because (1) the workflow uses pull_request trigger (no privilege
      # escalation), (2) GitHub reserves [bot] suffix for bot accounts so regular
      # users cannot spoof it, (3) all tests must pass before auto-merge, and
      # (4) only patch/minor updates are auto-merged.
      # Follow-up: switch to github.event.pull_request.user.login for
      # defense-in-depth when the codespace gains workflow push scope.
      - dependabot-automerge.yml:20
      - dependabot-automerge.yml:34
      - dependabot-automerge.yml:86
      - dependabot-automerge.yml:120
      - dependabot-automerge.yml:142
      - dependabot-automerge.yml:170
  secrets-outside-env:
    ignore:
      # Kane-approved risk acceptance for internal CI/CD automation only.
      # These line-scoped exceptions preserve the audit everywhere else while
      # accepting secure step-level secret handling in non-production workflows.
      # Deployment environments remain deferred until production deployment
      # workflows exist as part of the planned v1.5.0 release work.
      - release-docs.yml:61
      - release-docs.yml:161
      - release-docs.yml:242
      - squad-issue-assign.yml:123
      - squad-heartbeat.yml:256
      - squad-heartbeat.yml:257
      - release.yml:83
