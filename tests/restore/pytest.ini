[pytest]
testpaths = .
addopts = -ra -v --timeout=300
markers =
    docker: requires Docker daemon and running stack (deselect with '-m "not docker"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    solr: Solr verification tests
    redis: Redis verification tests
    rabbitmq: RabbitMQ verification tests
    auth: Auth/collections DB verification tests
    services: Docker Compose service health tests
